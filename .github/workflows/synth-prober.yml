name: synth-prober
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ops/synth_prober/requirements.txt
      - name: Run probe
        env:
          API_BASE: ${{ secrets.API_BASE }}
          PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
        run: |
          python ops/synth_prober/prober.py --api "$API_BASE" ${PUSHGATEWAY_URL:+--pushgateway "$PUSHGATEWAY_URL"}
