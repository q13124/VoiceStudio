name: handshake-status
on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps (requests)
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
        continue-on-error: true

      - name: Detect changes in last window
        id: changes
        shell: bash
        run: |
          WINDOW_MINUTES=${WINDOW_MINUTES:-15}
          if git log --since "${WINDOW_MINUTES} minutes ago" --pretty=oneline | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build 60s status (auto-grab)
        id: build
        env:
          WINDOW_MINUTES: 15
          PLAN_FILE: docs/START_HERE_EXACT_PLAN.md
          ALT_PLAN_FILE: docs/15_MINUTE_WORKFLOW.md
        run: |
          python - << 'PY'
          import os, subprocess, pathlib, datetime, json
          win = int(os.getenv('WINDOW_MINUTES','15'))
          def sh(*a): return subprocess.check_output(list(a), text=True).strip()

          # 1) Commits in window
          try:
              commits = sh("git","log","--since",f"{win} minutes ago","--pretty=format:%h %s (by %an)")
          except Exception as e:
              commits = f"— Could not read git log: {e}"
          commits = commits or "— No commits in this window."

          # 2) Recent PRs merged in window (best-effort via git)
          try:
              prs = sh("git","log","--merges","--since",f"{win} minutes ago","--pretty=format:%h %s")
          except Exception:
              prs = ""
          prs = prs or "— No PR merges in this window."

          # 3) Plan "next tasks"
          plan = os.getenv('PLAN_FILE'); alt = os.getenv('ALT_PLAN_FILE')
          next_tasks = ""
          for p in (plan, alt):
              if not p: continue
              fp = pathlib.Path(p)
              if fp.exists():
                  lines = [l.rstrip() for l in fp.read_text(errors='ignore').splitlines()]
                  # capture bullets after a header containing Today/Next/Tasks
                  idx = [i for i,l in enumerate(lines) if any(k in l.lower() for k in ['today','next','tasks'])]
                  cap=[]
                  for i in (idx[:1] or [0]):
                      for l in lines[i+1:i+60]:
                          s=l.strip()
                          if s.startswith(('#','**')): break
                          if s.startswith(('-','*','•','1.','2.','3.')): cap.append(s)
                          if len(cap)>=6: break
                  if cap: next_tasks = "\n".join(cap); break
          if not next_tasks:
              next_tasks = "— Update START_HERE_EXACT_PLAN.md or docs/15_MINUTE_WORKFLOW.md with a 'Next' section."

          # 4) Blockers from plan
          blockers = "— None"
          try:
              src = ""
              if plan and pathlib.Path(plan).exists(): src += pathlib.Path(plan).read_text(errors='ignore')
              if not src and alt and pathlib.Path(alt).exists(): src = pathlib.Path(alt).read_text(errors='ignore')
              lines = [l for l in src.splitlines() if any(k in l.upper() for k in ['BLOCKER','RISK','TODO:'])]
              if lines: blockers = "\n".join(lines[:5])
          except Exception: pass

          # 5) Last workflow failures (best-effort via grep of previous summary file)
          ci = "— See Actions tab for latest runs."

          stamp = datetime.datetime.utcnow().isoformat(timespec='minutes')+"Z"
          msg = f"""VoiceStudio 60-sec Status — {stamp}

1) What changed since last check-in:
{commits}

Merges:
{prs}

2) What's next from the plan:
{next_tasks}

3) Blockers / decisions needed:
{blockers}
"""
          open("status.msg","w",encoding="utf-8").write(msg)
          print(msg)
          PY

      - name: Maybe post to Slack
        if: steps.changes.outputs.changed == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data-binary @- <<'JSON'
          {"text": "$(cat status.msg | sed 's/"/\\"/g')"}
          JSON

      - name: Maybe send email (hourly max)
        if: steps.changes.outputs.changed == 'true' && env.SENDGRID_API_KEY != '' && env.STATUS_EMAIL_TO != '' && env.STATUS_EMAIL_FROM != ''
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          STATUS_EMAIL_TO:  ${{ secrets.STATUS_EMAIL_TO }}
          STATUS_EMAIL_FROM: ${{ secrets.STATUS_EMAIL_FROM }}
        run: |
          # Gate to ~hourly: only when minute % 60 == 0
          M=$(date -u +%s)
          MOD=$(( (M/60) % 60 ))
          if [ "$MOD" != "0" ]; then echo "Skip email (throttle)"; exit 0; fi
          curl -sS --fail -X POST https://api.sendgrid.com/v3/mail/send \
            -H "Authorization: Bearer $SENDGRID_API_KEY" \
            -H 'Content-Type: application/json' \
            -d @- <<JSON
          {
            "personalizations": [{"to": [{"email": "${STATUS_EMAIL_TO}"}]}],
            "from": {"email": "${STATUS_EMAIL_FROM}", "name": "VS Handshake"},
            "subject": "VS Handshake Status",
            "content": [{"type": "text/plain", "value": $(cat status.msg | python -c 'import json,sys; print(json.dumps(sys.stdin.read()))') }]
          }
          JSON

      - name: Update docs/HANDSHAKE_STATUS.md (prepend latest)
        run: |
          mkdir -p docs
          [ -f docs/HANDSHAKE_STATUS.md ] || touch docs/HANDSHAKE_STATUS.md
          { echo "## $(date -u +'%Y-%m-%d %H:%MZ')"; echo; cat status.msg; echo; echo "---"; echo; } \
            | cat - docs/HANDSHAKE_STATUS.md | head -c 200000 > docs/HANDSHAKE_STATUS.md

      - name: Commit & push status (hourly throttle)
        run: |
          M=$(date -u +%s); MOD=$(( (M/60) % 60 ))
          [ "$MOD" = "0" ] || { echo "Skip commit (throttle)"; exit 0; }
          git config user.name  "VS Handshake Bot"
          git config user.email "bot@users.noreply.github.com"
          if ! git diff --quiet -- docs/HANDSHAKE_STATUS.md; then
            git add docs/HANDSHAKE_STATUS.md
            git commit -m "handshake: auto 60s status [skip ci]"
            git push
          else
            echo "No change; nothing to commit."
          fi

      - name: Post to pinned 'Handshake Feed' issue (optional)
        if: ${{ env.GITHUB_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Check if gh is available
          if ! command -v gh &> /dev/null; then
            echo "GitHub CLI not available, skipping issue posting"
            exit 0
          fi
          # create or find issue titled "Handshake Feed"
          num=$(gh issue list --search "Handshake Feed in:title" --json number,title | jq -r '.[0].number // empty')
          if [ -z "$num" ]; then
            num=$(gh issue create -t "Handshake Feed" -b "Automated 15-minute status thread")
          fi
          gh issue comment "$num" -b "$(cat status.msg)"
        continue-on-error: true
