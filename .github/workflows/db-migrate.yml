name: db-migrate
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'alembic/**'
      - 'app/core/**'
      - 'app/web/**'
      - 'requirements*.txt'

jobs:
  migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: voicestudio
          POSTGRES_USER: voicestudio
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U voicestudio" \
          --health-interval 10s \
          --health-timeout 5s \
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install alembic psycopg[binary]

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U voicestudio && break
            sleep 2
          done

      - name: Export DB_URL
        run: |
          echo "DB_URL=postgresql+psycopg://voicestudio:secret@127.0.0.1:5432/voicestudio" >> $GITHUB_ENV

      - name: Run migrations (upgrade head)
        env:
          DB_URL: ${{ env.DB_URL }}
          PYTHONPATH: ${{ env.PYTHONPATH }}
        run: |
          alembic upgrade head

      - name: Smoke import models
        env:
          DB_URL: ${{ env.DB_URL }}
          PYTHONPATH: ${{ env.PYTHONPATH }}
        run: |
          python - <<'PY'
          from app.core.db import engine, Base
          from sqlalchemy import inspect
          insp = inspect(engine)
          assert 'ab_summary' in insp.get_table_names()
          assert 'eval_runs' in insp.get_table_names()
          print('Tables present OK')
          PY
