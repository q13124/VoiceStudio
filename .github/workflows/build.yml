name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-frontend:
    name: Build C# Frontend
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MSBuild Structured Log Viewer CLI
        run: dotnet tool install --global MSBuild.StructuredLogger.Tool || true
        continue-on-error: true

      - name: Verify StructuredLogger CLI installation
        id: structuredlogger-check
        run: |
          Write-Host "=== StructuredLogger CLI Verification ===" -ForegroundColor Cyan
          
          # Check if binlog command is available
          $binlogCmd = Get-Command "binlog" -ErrorAction SilentlyContinue
          
          if ($binlogCmd) {
            Write-Host "StructuredLogger CLI found at: $($binlogCmd.Source)" -ForegroundColor Green
            
            # Verify version
            try {
              $version = & binlog --version 2>&1
              Write-Host "Version: $version" -ForegroundColor Green
              echo "structuredlogger_available=true" >> $env:GITHUB_OUTPUT
            } catch {
              Write-Host "Warning: Could not get version info" -ForegroundColor Yellow
              echo "structuredlogger_available=true" >> $env:GITHUB_OUTPUT
            }
          } else {
            Write-Host "StructuredLogger CLI not found in PATH" -ForegroundColor Yellow
            Write-Host "Binlog analysis will use fallback methods" -ForegroundColor Yellow
            echo "structuredlogger_available=false" >> $env:GITHUB_OUTPUT
          }
        continue-on-error: true

      - name: Restore dependencies
        run: |
          dotnet restore VoiceStudio.sln -p:Platform=x64
          dotnet restore src/VoiceStudio.App/VoiceStudio.App.csproj -r win-x64 -p:Platform=x64

      - name: Proactive XAML health check
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/proactive-xaml-check.ps1 -OutputFile .buildlogs/xaml-health.json
        continue-on-error: true

      - name: Validate XAML bindings (x:Bind and x:DataType)
        run: |
          Write-Host "=== XAML Binding Validation ===" -ForegroundColor Cyan
          
          # Check that all UserControls in Views/Panels have x:DataType
          $panelFiles = Get-ChildItem -Path "src/VoiceStudio.App/Views/Panels/*.xaml" -ErrorAction SilentlyContinue
          $missingDataType = @()
          
          foreach ($file in $panelFiles) {
            $content = Get-Content $file.FullName -Raw
            if ($content -match "<UserControl" -and $content -notmatch "x:DataType=") {
              $missingDataType += $file.Name
            }
          }
          
          if ($missingDataType.Count -gt 0) {
            Write-Host "ERROR: The following panels are missing x:DataType:" -ForegroundColor Red
            $missingDataType | ForEach-Object { Write-Host "  - $_" -ForegroundColor Red }
            exit 1
          }
          
          Write-Host "All panel UserControls have x:DataType defined" -ForegroundColor Green
          
          # Check for legacy {Binding} usage that should be {x:Bind}
          $bindingWarnings = @()
          $xamlFiles = Get-ChildItem -Path "src/VoiceStudio.App/Views/**/*.xaml" -Recurse -ErrorAction SilentlyContinue
          
          foreach ($file in $xamlFiles) {
            $content = Get-Content $file.FullName -Raw
            # Check for {Binding that is NOT in a DataTemplate or ControlTemplate (allowed there for now)
            if ($content -match '\{Binding\s+[^}]+\}' -and $content -notmatch 'TemplatedParent') {
              $bindingWarnings += $file.Name
            }
          }
          
          if ($bindingWarnings.Count -gt 0) {
            Write-Host "WARNING: Legacy {Binding} found in files (consider converting to {x:Bind}):" -ForegroundColor Yellow
            $bindingWarnings | Select-Object -Unique | ForEach-Object { Write-Host "  - $_" -ForegroundColor Yellow }
          }
          
          Write-Host "XAML binding validation passed" -ForegroundColor Green

      - name: Build Core library
        run: dotnet build src/VoiceStudio.Core/VoiceStudio.Core.csproj -c Release --no-restore
        id: build-core

      - name: Build solution (Debug, x64) with binlog
        run: |
          dotnet build --configuration Debug -p:Platform=x64 /bl:.buildlogs/build_debug.binlog
        id: build-debug
        continue-on-error: true

      - name: Build solution (Release, x64) with binlog
        run: |
          dotnet build --configuration Release -p:Platform=x64 /bl:.buildlogs/build_release.binlog
        id: build-release
        continue-on-error: true

      - name: Extract binlog metrics (proactive analysis)
        if: always()
        run: |
          Write-Host "=== Proactive Binlog Analysis ===" -ForegroundColor Cyan
          New-Item -ItemType Directory -Path .buildlogs/binlog-metrics -Force | Out-Null
          
          # Extract build metrics from binlogs for trend analysis
          $metrics = @{
            timestamp = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            commit = "${{ github.sha }}"
            branch = "${{ github.ref_name }}"
            build_debug_success = "${{ steps.build-debug.outcome }}" -eq "success"
            build_release_success = "${{ steps.build-release.outcome }}" -eq "success"
          }
          
          # Count XAML files
          $xamlFiles = Get-ChildItem -Path "src/VoiceStudio.App" -Filter "*.xaml" -Recurse
          $metrics.xaml_file_count = $xamlFiles.Count
          
          # Count binlog sizes (indicator of build complexity)
          if (Test-Path ".buildlogs/build_debug.binlog") {
            $metrics.binlog_debug_size_mb = [math]::Round((Get-Item ".buildlogs/build_debug.binlog").Length / 1MB, 2)
          }
          if (Test-Path ".buildlogs/build_release.binlog") {
            $metrics.binlog_release_size_mb = [math]::Round((Get-Item ".buildlogs/build_release.binlog").Length / 1MB, 2)
          }
          
          # Extract XAML-specific metrics using StructuredLogger CLI if available
          $structuredLoggerCli = Get-Command "binlog" -ErrorAction SilentlyContinue
          if ($structuredLoggerCli) {
            Write-Host "Using StructuredLogger CLI for detailed analysis..."
            try {
              # Count XamlCompiler invocations and durations
              $xamlAnalysis = binlog search ".buildlogs/build_debug.binlog" "XamlCompiler" 2>$null | Measure-Object -Line
              $metrics.xaml_compiler_invocations = $xamlAnalysis.Lines
            } catch {
              Write-Host "StructuredLogger analysis skipped: $_"
            }
          }
          
          # Save metrics as JSON
          $metrics | ConvertTo-Json -Depth 3 | Set-Content -Path ".buildlogs/binlog-metrics/build-metrics.json"
          Write-Host "Build metrics saved to .buildlogs/binlog-metrics/build-metrics.json"
          
          # Append to trend file (for historical tracking)
          $trendFile = ".buildlogs/binlog-metrics/build-trend.jsonl"
          $metrics | ConvertTo-Json -Compress | Add-Content -Path $trendFile
          Write-Host "Metrics appended to trend file"
        continue-on-error: true

      - name: Analyze binlog on build failure
        if: failure() && (steps.build-debug.outcome == 'failure' || steps.build-release.outcome == 'failure')
        run: |
          Write-Host "Build failed. Analyzing binlog for XAML compiler issues..."
          New-Item -ItemType Directory -Path .buildlogs -Force | Out-Null
          if (Test-Path scripts/analyze-binlog.ps1) {
            # Output text to file for PR comment, also print summary to console
            powershell -ExecutionPolicy Bypass -File scripts/analyze-binlog.ps1 -OutputFormat text -OutputFile .buildlogs/analysis-output.txt
            # Also generate JSON for programmatic consumption
            powershell -ExecutionPolicy Bypass -File scripts/analyze-binlog.ps1 -OutputFormat json -OutputFile .buildlogs/analysis-output.json
          } else {
            Write-Host "analyze-binlog.ps1 not found - check binlogs manually"
            "analyze-binlog.ps1 not found - check binlogs manually" | Set-Content -Path .buildlogs/analysis-output.txt
          }
        continue-on-error: true

      - name: Post XAML diagnostic comment to PR
        if: failure() && github.event_name == 'pull_request' && (steps.build-debug.outcome == 'failure' || steps.build-release.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let analysisOutput = 'Binlog analysis not available';
            let nestedViewsFound = false;
            
            // Read analysis from file (more reliable than capturing stdout)
            try {
              if (fs.existsSync('.buildlogs/analysis-output.txt')) {
                analysisOutput = fs.readFileSync('.buildlogs/analysis-output.txt', 'utf8');
              }
              
              // Check for nested Views issues from JSON
              if (fs.existsSync('.buildlogs/analysis-output.json')) {
                const analysis = JSON.parse(fs.readFileSync('.buildlogs/analysis-output.json', 'utf8'));
                nestedViewsFound = analysis.NestedViewsXaml && analysis.NestedViewsXaml.length > 0;
              }
            } catch (e) {
              console.log('Failed to read analysis files:', e.message);
            }
            
            // Format the comment body
            let body = `## XAML Compiler Failure Analysis\n\n`;
            
            if (nestedViewsFound) {
              body += `**WARNING: Nested Views XAML detected!** This is a known cause of silent XamlCompiler.exe failures.\n`;
              body += `See [GitHub #10947](https://github.com/microsoft/microsoft-ui-xaml/issues/10947)\n\n`;
            }
            
            body += `### Analysis Output\n\`\`\`\n${analysisOutput.substring(0, 3000)}\n\`\`\`\n\n`;
            body += `### Next Steps\n`;
            body += `1. Download the \`build-binlogs\` artifact from this workflow run\n`;
            body += `2. Open in [MSBuild Structured Log Viewer](https://msbuildlog.com/)\n`;
            body += `3. Search for "XamlCompiler" to find the failing task\n`;
            body += `4. See [XAML Change Protocol](docs/developer/XAML_CHANGE_PROTOCOL.md) for troubleshooting\n`;
            
            // Post the comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
        continue-on-error: true

      - name: RuleGuard (no stubs/placeholders)
        run: python tools/verify_no_stubs_placeholders.py
        continue-on-error: true

      - name: Gate C publish check (no launch)
        run: powershell -ExecutionPolicy Bypass -File scripts/gatec-publish-launch.ps1 -Configuration Release -RuntimeIdentifier win-x64 -NoLaunch
        continue-on-error: true

      - name: Log Build Results to Audit System
        if: always()
        run: |
          python scripts/build_logger.py --output .buildlogs/build_output.txt --json > .buildlogs/audit_build_results.json 2>&1 || true
        continue-on-error: true

      - name: Installer build validation (scripts + publish output)
        run: |
          powershell -ExecutionPolicy Bypass -File installer/verify-installer-build.ps1 -InstallerType InnoSetup -Version 0.0.0
          powershell -ExecutionPolicy Bypass -File installer/verify-installer-build.ps1 -InstallerType WiX -Version 0.0.0
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            .buildlogs/x64/Release/
          retention-days: 7

      - name: Upload Gate C artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gatec-publish
          path: |
            .buildlogs/gatec-latest.txt
            .buildlogs/gatec-publish*.binlog
            .buildlogs/x64/Release/gatec-publish/gatec-launch.log
          retention-days: 7

      - name: Upload build binlogs (XAML diagnostics)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-binlogs
          path: |
            .buildlogs/build_debug.binlog
            .buildlogs/build_release.binlog
            .buildlogs/build_diagnostic_*.binlog
            .buildlogs/analysis-output.txt
            .buildlogs/analysis-output.json
            .buildlogs/xaml-health.json
            .buildlogs/binlog-metrics/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Audit Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-logs
          path: |
            .audit/log-*.jsonl
            .audit/log-*.md
            .buildlogs/audit_build_results.json
          retention-days: 14
          if-no-files-found: ignore

  xaml-quality:
    name: XAML Quality Checks
    runs-on: windows-latest
    needs: [build-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Run Unified XAML Quality Validation
        run: |
          python scripts/validate_xaml_quality.py --verbose
        # GAP-CI-001: Removed continue-on-error to enforce quality gates
        id: xaml-quality
        
      - name: Run XAML Binding Validation
        run: |
          python scripts/validate_xaml_bindings.py --verbose
        # GAP-CI-001: Removed continue-on-error to enforce quality gates
        id: xaml-bindings
        
      - name: XAML Quality Summary
        if: always()
        run: |
          Write-Host "=== XAML Quality Summary ===" -ForegroundColor Cyan
          
          if ("${{ steps.xaml-quality.outcome }}" -eq "failure") {
            Write-Host "[WARN] XAML quality checks found issues" -ForegroundColor Yellow
          } else {
            Write-Host "[OK] XAML quality checks passed" -ForegroundColor Green
          }
          
          if ("${{ steps.xaml-bindings.outcome }}" -eq "failure") {
            Write-Host "[WARN] XAML binding validation found issues" -ForegroundColor Yellow
          } else {
            Write-Host "[OK] XAML binding validation passed" -ForegroundColor Green
          }
          
      - name: Upload XAML Quality Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xaml-quality-reports
          path: |
            .buildlogs/xaml-quality.json
            .buildlogs/xaml-bindings.json
          retention-days: 14
          if-no-files-found: ignore

  validate-platform:
    name: Validate Native Windows Platform
    runs-on: windows-latest
    needs: [build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify no Electron dependencies
        run: |
          $matches = Get-ChildItem -Recurse -Filter *.csproj | Select-String -Pattern "Electron"
          if ($matches) {
            Write-Error "BLOCKED: Electron dependencies violate ADR-010."
            exit 1
          }
          Write-Host "Platform constraint validated: No Electron dependencies."

      - name: Verify WinUI 3 target
        run: |
          $csproj = Get-Content "src/VoiceStudio.App/VoiceStudio.App.csproj" -Raw
          if ($csproj -notmatch "Microsoft.WindowsAppSDK") {
            Write-Error "BLOCKED: Missing Windows App SDK - violates ADR-010."
            exit 1
          }
          Write-Host "Platform constraint validated: Windows App SDK present."

  build-backend:
    name: Build Python Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements_engines.txt ]; then pip install -r requirements_engines.txt; fi
          if [ -f requirements_missing_libraries.txt ]; then pip install -r requirements_missing_libraries.txt; fi

      - name: Verify Python installation
        run: |
          python --version
          pip list

      - name: Check for syntax errors
        run: |
          python -m py_compile backend/api/main.py
          find backend -name "*.py" -exec python -m py_compile {} \;

      - name: Validate OpenAPI contract
        run: |
          python scripts/validate_openapi_contract.py
        # GAP-CI-001: Contract validation must pass (removed continue-on-error)

      - name: Export OpenAPI schema
        run: |
          python scripts/export_openapi_schema.py --output docs/api/openapi.json
        # GAP-CI-001: Schema export is critical for contract tests (removed continue-on-error)

      - name: Upload OpenAPI schema
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openapi-schema
          path: docs/api/openapi.json
          retention-days: 30
          if-no-files-found: ignore

  verify-installer:
    name: Verify Installer Scripts
    runs-on: windows-latest
    needs: [build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify installer scripts exist
        run: |
          if (Test-Path "installer/VoiceStudio.iss") { Write-Host "NSIS installer script found" } else { exit 1 }
          if (Test-Path "installer/VoiceStudio.wxs") { Write-Host "WiX installer script found" } else { exit 1 }
          if (Test-Path "installer/build-installer.ps1") { Write-Host "PowerShell build script found" } else { exit 1 }

      - name: Validate PowerShell scripts
        run: |
          $scripts = @("installer/build-installer.ps1", "installer/verify-installer.ps1", "scripts/prepare-release.ps1")
          foreach ($script in $scripts) {
            if (Test-Path $script) {
              Write-Host "Validating $script"
              $errors = $null
              $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $script -Raw), [ref]$errors)
              if ($errors.Count -gt 0) {
                Write-Host "Errors found in $script"
                $errors | ForEach-Object { Write-Host $_.Message }
                exit 1
              }
            }
          }

  warning-budget:
    name: Warning Budget Check (TD-007)
    runs-on: windows-latest
    needs: [build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore dependencies
        run: dotnet restore

      - name: Check warning budget
        run: python scripts/check_warning_budget.py --json

      - name: Upload warning report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: warning-budget-report
          path: .buildlogs/verification/
          retention-days: 30

  verify-gates:
    name: Verify Gate Status and Ledger
    runs-on: ubuntu-latest
    needs: [build-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run verification checks
        run: python scripts/run_verification.py
        
      - name: Upload verification report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-report
          path: .buildlogs/verification/last_run.json
          retention-days: 30

  validate-contracts:
    name: Validate API Contracts
    runs-on: windows-latest
    needs: [build-frontend, build-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install NSwag CLI
        run: dotnet tool install -g NSwag.ConsoleCore || true
        continue-on-error: true

      - name: Download OpenAPI schema artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-schema
          path: docs/api/
        continue-on-error: true

      - name: Regenerate C# client from OpenAPI
        run: |
          powershell -ExecutionPolicy Bypass -File tools/nswag/generate-client.ps1 -Force
        id: generate-client

      - name: Check for uncommitted generated code changes (drift detection)
        id: drift-check
        run: |
          # Check if generated file has uncommitted changes
          $diff = git diff --name-only src/VoiceStudio.App/Services/Generated/
          
          if ($diff) {
            Write-Host "[WARN] Generated client has uncommitted changes:" -ForegroundColor Yellow
            Write-Host $diff
            git diff src/VoiceStudio.App/Services/Generated/BackendClient.g.cs | Select-Object -First 50
            
            echo "drift_detected=true" >> $env:GITHUB_OUTPUT
            
            # Create drift report
            New-Item -ItemType Directory -Path .buildlogs/contract-drift -Force | Out-Null
            git diff src/VoiceStudio.App/Services/Generated/ > .buildlogs/contract-drift/generated-diff.txt
            
            @{
              timestamp = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
              commit = "${{ github.sha }}"
              drift_detected = $true
              files_changed = $diff
            } | ConvertTo-Json | Set-Content -Path .buildlogs/contract-drift/drift-report.json
          } else {
            Write-Host "[OK] Generated client is in sync with OpenAPI schema" -ForegroundColor Green
            echo "drift_detected=false" >> $env:GITHUB_OUTPUT
          }

      - name: Verify generated client compiles
        run: |
          powershell -ExecutionPolicy Bypass -File tools/nswag/verify-client.ps1 -Quick
        id: verify-client

      - name: Validate contract compatibility
        run: python tools/nswag/validate-contract.py
        # GAP-CI-001: Contract compatibility is critical (removed continue-on-error)
        id: contract-check

      - name: Detect breaking changes
        run: |
          python tools/nswag/detect-breaking-changes.py --json > .buildlogs/breaking-changes.json 2>&1 || true
          python tools/nswag/detect-breaking-changes.py
        # GAP-CI-001: Breaking change detection is important (removed continue-on-error)
        id: breaking-changes

      - name: Run Python contract tests
        run: |
          python -m pip install pytest --quiet
          python -m pytest tests/contract/test_openapi_contract.py -v --tb=short
        # GAP-CI-001: Contract tests should fail CI if they fail
        id: python-contract-tests

      - name: Run C# contract tests
        run: |
          dotnet test tests/contract/VoiceStudio.ContractTests.csproj --logger "console;verbosity=normal" --no-restore
        # GAP-CI-001: Contract tests should fail CI if they fail
        id: csharp-contract-tests

      - name: Report contract validation status
        if: steps.drift-check.outputs.drift_detected == 'true' || steps.contract-check.outcome == 'failure' || steps.breaking-changes.outcome == 'failure' || steps.python-contract-tests.outcome == 'failure' || steps.csharp-contract-tests.outcome == 'failure'
        run: |
          Write-Host "============================================" -ForegroundColor Yellow
          Write-Host " CONTRACT VALIDATION ISSUES DETECTED" -ForegroundColor Yellow
          Write-Host "============================================" -ForegroundColor Yellow
          
          if ("${{ steps.drift-check.outputs.drift_detected }}" -eq "true") {
            Write-Host ""
            Write-Host "[DRIFT] Generated client differs from committed version" -ForegroundColor Red
            Write-Host "The OpenAPI schema has changed but the C# client was not regenerated."
            Write-Host ""
            Write-Host "To fix:" -ForegroundColor Cyan
            Write-Host "  1. Run: powershell tools/nswag/generate-client.ps1 -Force"
            Write-Host "  2. Review the changes in src/VoiceStudio.App/Services/Generated/"
            Write-Host "  3. Commit the regenerated client"
          }
          
          if ("${{ steps.contract-check.outcome }}" -eq "failure") {
            Write-Host ""
            Write-Host "[COMPAT] Contract compatibility check failed" -ForegroundColor Red
            Write-Host "See contract-check step output for details"
          }
          
          if ("${{ steps.breaking-changes.outcome }}" -eq "failure") {
            Write-Host ""
            Write-Host "[BREAKING] Breaking changes detected in API contract" -ForegroundColor Red
            Write-Host "Review the changes before merging to ensure compatibility."
            Write-Host ""
            Write-Host "Options:" -ForegroundColor Cyan
            Write-Host "  1. Bump API version if changes are intentional"
            Write-Host "  2. Add deprecation period for removed endpoints"
            Write-Host "  3. Document migration path for breaking changes"
          }
          
          if ("${{ steps.python-contract-tests.outcome }}" -eq "failure") {
            Write-Host ""
            Write-Host "[TESTS] Python contract tests failed" -ForegroundColor Red
            Write-Host "Run: python -m pytest tests/contract/test_openapi_contract.py -v"
          }
          
          if ("${{ steps.csharp-contract-tests.outcome }}" -eq "failure") {
            Write-Host ""
            Write-Host "[TESTS] C# contract tests failed" -ForegroundColor Red
            Write-Host "Run: dotnet test tests/contract/VoiceStudio.ContractTests.csproj"
          }

      - name: Upload contract validation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-validation
          path: |
            .buildlogs/contract-drift/
            .buildlogs/breaking-changes.json
            src/VoiceStudio.App/Services/Generated/BackendClient.g.cs
          retention-days: 14
          if-no-files-found: ignore

      - name: Fail build on contract drift (PR only)
        if: github.event_name == 'pull_request' && steps.drift-check.outputs.drift_detected == 'true'
        run: |
          Write-Host "::error::Generated C# client is out of sync with OpenAPI schema. Regenerate and commit."
          exit 1

  quality-scorecard:
    name: Quality Scorecard
    runs-on: ubuntu-latest
    needs: [build-backend, verify-gates]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Quality Scorecard
        run: |
          python scripts/quality_scorecard.py --json
        continue-on-error: true

      - name: Check quality threshold
        run: |
          if [ -f "docs/reports/quality/scorecard.json" ]; then
            SCORE=$(python -c "import json; print(json.load(open('docs/reports/quality/scorecard.json'))['composite_score'])")
            echo "Quality Score: $SCORE%"
            
            if (( $(echo "$SCORE < 60" | bc -l) )); then
              echo "::warning::Quality score ($SCORE%) is below threshold (60%)"
            fi
          else
            echo "::warning::Quality scorecard not generated"
          fi
        continue-on-error: true

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-scorecard
          path: |
            docs/reports/quality/scorecard.json
            docs/reports/quality/scorecard.md
          retention-days: 30
          if-no-files-found: ignore

  regression-detection:
    name: Regression Detection
    runs-on: ubuntu-latest
    needs: [build-backend, quality-scorecard]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download quality scorecard
        uses: actions/download-artifact@v4
        with:
          name: quality-scorecard
          path: docs/reports/quality/
        continue-on-error: true

      - name: Run regression detection
        run: |
          python scripts/detect_regressions.py --type quality --json
        continue-on-error: true

      - name: Report regressions
        if: always()
        run: |
          if [ -f ".buildlogs/regressions/regression_report.json" ]; then
            TOTAL=$(python -c "import json; r=json.load(open('.buildlogs/regressions/regression_report.json')); print(r.get('total_regressions', 0))")
            if [ "$TOTAL" -gt 0 ]; then
              echo "::warning::$TOTAL regression(s) detected. See artifact for details."
            else
              echo "No regressions detected."
            fi
          fi
        continue-on-error: true

      - name: Upload regression report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: .buildlogs/regressions/
          retention-days: 14
          if-no-files-found: ignore
