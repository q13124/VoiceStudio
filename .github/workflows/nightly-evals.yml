name: nightly-evals
on:
  schedule:
    - cron: '7 6 * * *'   # 06:07 UTC daily
  workflow_dispatch:

jobs:
  run-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run golden-set (example placeholder)
        run: |
          echo "Run your golden-set CLI here and produce an ingest payload JSON"
          echo '{"runId":"${{ github.run_id }}","date":"'$(date -u +%F)'","perEngine":{"xtts":{"wr":0.62,"latency_p50":180,"latency_p95":420,"clip_rate":0.01,"lufs_med":-23.1}}}' > ingest.json
      - name: Post ingest
        env:
          API_BASE: ${{ secrets.API_BASE }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          curl -sS -X POST "$API_BASE/v1/evals/ingest" \
            -H "Authorization: Bearer $API_TOKEN" \
            -H "Content-Type: application/json" \
            --data @ingest.json