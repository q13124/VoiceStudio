# SBOM (Software Bill of Materials) Generation
# Task 2.3.5: Generate SBOM for all dependencies
#
# Produces CycloneDX and SPDX format SBOMs for compliance and security tracking.

name: SBOM Generation

on:
  push:
    branches: [main, release/*]
    paths:
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'pyproject.toml'
      - '*.csproj'
      - 'Directory.Packages.props'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      format:
        description: 'SBOM format'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - cyclonedx
          - spdx

env:
  PYTHON_VERSION: '3.11'
  DOTNET_VERSION: '8.0.x'

jobs:
  python-sbom:
    name: Generate Python SBOM
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-bom pip-licenses
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Generate CycloneDX SBOM
        if: github.event.inputs.format != 'spdx'
        run: |
          mkdir -p .buildlogs/sbom
          cyclonedx-py requirements \
            --format json \
            --output .buildlogs/sbom/python-cyclonedx.json \
            requirements.txt || true
          cyclonedx-py requirements \
            --format xml \
            --output .buildlogs/sbom/python-cyclonedx.xml \
            requirements.txt || true
            
      - name: Generate license report
        run: |
          pip-licenses --format=json --output-file=.buildlogs/sbom/python-licenses.json
          pip-licenses --format=markdown --output-file=.buildlogs/sbom/python-licenses.md
          
      - name: Upload Python SBOM
        uses: actions/upload-artifact@v4
        with:
          name: python-sbom
          path: .buildlogs/sbom/
          retention-days: 90

  dotnet-sbom:
    name: Generate .NET SBOM
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Install CycloneDX tool
        run: dotnet tool install --global CycloneDX
        
      - name: Restore dependencies
        run: dotnet restore
        continue-on-error: true
        
      - name: Generate CycloneDX SBOM
        if: github.event.inputs.format != 'spdx'
        run: |
          New-Item -ItemType Directory -Force -Path .buildlogs/sbom
          dotnet CycloneDX VoiceStudio.sln -o .buildlogs/sbom -j
        continue-on-error: true
        
      - name: Generate package list
        run: |
          dotnet list package --format json > .buildlogs/sbom/dotnet-packages.json 2>&1
        continue-on-error: true
        
      - name: Upload .NET SBOM
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-sbom
          path: .buildlogs/sbom/
          retention-days: 90

  combine-sbom:
    name: Combine SBOMs
    runs-on: ubuntu-latest
    needs: [python-sbom, dotnet-sbom]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Download Python SBOM
        uses: actions/download-artifact@v4
        with:
          name: python-sbom
          path: .buildlogs/sbom/python/
        continue-on-error: true
        
      - name: Download .NET SBOM
        uses: actions/download-artifact@v4
        with:
          name: dotnet-sbom
          path: .buildlogs/sbom/dotnet/
        continue-on-error: true
        
      - name: Create combined manifest
        run: |
          mkdir -p .buildlogs/sbom/combined
          
          cat > .buildlogs/sbom/combined/manifest.json << 'EOF'
          {
            "name": "VoiceStudio",
            "version": "${{ github.ref_name }}",
            "generated": "$(date -Iseconds)",
            "commit": "${{ github.sha }}",
            "components": {
              "python": ".buildlogs/sbom/python/python-cyclonedx.json",
              "dotnet": ".buildlogs/sbom/dotnet/dotnet-cyclonedx.json"
            }
          }
          EOF
          
      - name: Upload combined SBOM
        uses: actions/upload-artifact@v4
        with:
          name: voicestudio-sbom
          path: .buildlogs/sbom/
          retention-days: 365
          
      - name: Attach to release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: .buildlogs/sbom/combined/manifest.json
          asset_name: sbom-manifest.json
          asset_content_type: application/json
        continue-on-error: true
