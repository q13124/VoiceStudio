name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build-release:
    name: Build Release
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build solution (Release)
        run: dotnet build --configuration Release --no-restore
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements_engines.txt ]; then pip install -r requirements_engines.txt; fi
          
      - name: Run tests before release
        run: |
          pip install pytest
          pytest tests/unit/ -v --tb=short
        # Tests must pass for release - no continue-on-error
        
      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom pip-licenses
          python scripts/generate_sbom.py --validate
        continue-on-error: true  # SBOM generation should not block release
        
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: .buildlogs/sbom/
          retention-days: 90
          if-no-files-found: warn
        
      - name: Build installer
        run: |
          if (Test-Path "installer/build-installer.ps1") {
            powershell -ExecutionPolicy Bypass -File installer/build-installer.ps1
          } else {
            Write-Host "Installer build script not found, skipping installer generation"
            exit 1
          }
        # Installer build must succeed for release
        
      - name: Create release artifacts
        run: |
          $version = if ($env:GITHUB_REF -match 'refs/tags/v(.+)') { $matches[1] } else { ${{ github.event.inputs.version }} }
          New-Item -ItemType Directory -Force -Path "release-artifacts"
          
          if (Test-Path "src/VoiceStudio.App/bin/Release/net8.0-windows10.0.19041.0/publish") {
            Copy-Item -Path "src/VoiceStudio.App/bin/Release/net8.0-windows10.0.19041.0/publish/*" -Destination "release-artifacts/" -Recurse -Force
          }
          
          if (Test-Path "installer/VoiceStudio-Setup.exe") {
            Copy-Item -Path "installer/VoiceStudio-Setup.exe" -Destination "release-artifacts/VoiceStudio-Setup-v$version.exe"
          }
          
          if (Test-Path "installer/VoiceStudio.msi") {
            Copy-Item -Path "installer/VoiceStudio.msi" -Destination "release-artifacts/VoiceStudio-v$version.msi"
          }
          
          # Include SBOM in release artifacts
          if (Test-Path ".buildlogs/sbom/voicestudio-sbom.json") {
            Copy-Item -Path ".buildlogs/sbom/voicestudio-sbom.json" -Destination "release-artifacts/VoiceStudio-v$version-sbom.json"
          }
          
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/
          retention-days: 30
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-release:
    name: Verify Release
    runs-on: windows-latest
    needs: [build-release]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/
          
      - name: Verify installer exists
        run: |
          if (Test-Path "release-artifacts/VoiceStudio-Setup-*.exe") {
            Write-Host "Installer found:"
            Get-ChildItem "release-artifacts/VoiceStudio-Setup-*.exe" | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "Warning: Installer not found in artifacts"
          }
          
      - name: Verify release notes
        run: |
          if (Test-Path "RELEASE_NOTES.md") {
            Write-Host "Release notes found"
          } else {
            Write-Host "Warning: RELEASE_NOTES.md not found"
          }
          
      - name: Verify changelog
        run: |
          if (Test-Path "CHANGELOG.md") {
            Write-Host "Changelog found"
          } else {
            Write-Host "Warning: CHANGELOG.md not found"
          }

