# Phase 9: Release Pipeline
# Task 9.5: GitHub Actions workflow for releases

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
      prerelease:
        description: 'Is this a pre-release?'
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.11"
  DOTNET_VERSION: "8.0.x"

jobs:
  # ============================================================================
  # Build Release Artifacts
  # ============================================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Restore .NET dependencies
        run: |
          dotnet restore VoiceStudio.sln -p:Platform=x64
          dotnet restore src/VoiceStudio.App/VoiceStudio.App.csproj -r win-x64 -p:Platform=x64
      
      - name: Build .NET application
        run: |
          dotnet build src/VoiceStudio.Core/VoiceStudio.Core.csproj -c Release --no-restore
          dotnet publish src/VoiceStudio.App/VoiceStudio.App.csproj -c Release -p:Platform=x64 -o dist/VoiceStudio
      
      - name: Package Python backend
        run: |
          pyinstaller --name=voicestudio-backend --onedir --hidden-import=uvicorn backend/api/main.py
      
      - name: Create installer
        run: |
          # Install Inno Setup (would use actual installer in production)
          echo "Creating installer package..."
          # iscc installer/scripts/inno_setup.iss
      
      - name: Generate build provenance (Phase 7 Sprint 3)
        run: |
          $provenance = @{
            version = "1.0"
            buildType = "voice-studio-release"
            timestamp = (Get-Date -Format "o")
            commit = "${{ github.sha }}"
            ref = "${{ github.ref }}"
            runId = "${{ github.run_id }}"
            runNumber = "${{ github.run_number }}"
          } | ConvertTo-Json
          New-Item -ItemType Directory -Force -Path dist
          $provenance | Out-File -FilePath dist/build-provenance.json -Encoding utf8

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voicestudio-windows
          path: dist/

  # ============================================================================
  # Create GitHub Release
  # ============================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows]
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: voicestudio-windows
          path: dist/
      
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi
      
      - name: Create release archive
        run: |
          cd dist
          zip -r ../VoiceStudio-${{ steps.version.outputs.version }}-Windows.zip .
      
      - name: Generate changelog
        id: changelog
        run: |
          echo "## Changes" > CHANGELOG.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: VoiceStudio v${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}
          files: |
            VoiceStudio-${{ steps.version.outputs.version }}-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Publish Documentation
  # ============================================================================
  publish-docs:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: [create-release]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install MkDocs
        run: |
          pip install mkdocs mkdocs-material
      
      - name: Build documentation
        run: |
          mkdocs build --strict || echo "MkDocs not configured"
      
      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
