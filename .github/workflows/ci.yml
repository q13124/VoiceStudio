name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: voicestudio_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools

      - name: Generate lockfile (no upgrade)
        run: |
          chmod +x tooling/lock/generate_lock.sh
          bash tooling/lock/generate_lock.sh

      - name: Verify lockfile drift
        run: git diff --exit-code -- requirements.lock.txt

      - name: Install from lockfile (deterministic)
        run: pip install --require-hashes -r requirements.lock.txt

      - name: Run Alembic migrations (SQLite)
        env:
          DB_URL: sqlite:///./test.db
          PYTHONPATH: ${{ github.workspace }}
        run: |
          alembic upgrade head
          echo "SQLite migrations completed"

      - name: Run Alembic migrations (PostgreSQL)
        env:
          DB_URL: postgresql+psycopg://postgres:postgres@localhost:5432/voicestudio_test
          PYTHONPATH: ${{ github.workspace }}
        run: |
          alembic upgrade head
          echo "PostgreSQL migrations completed"

      - name: Run tests
        env:
          DB_URL: sqlite:///./test.db
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q
