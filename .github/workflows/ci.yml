# Phase 9: CI/CD Pipeline
# Task 9.4: GitHub Actions workflow for CI

name: CI

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"

jobs:
  # ============================================================================
  # Python Backend Tests
  # ============================================================================
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run linting
        run: |
          pip install ruff
          ruff check .
      
      - name: Run type checking
        run: |
          pip install mypy
          mypy backend app --ignore-missing-imports
      
      - name: Run tests
        run: |
          python -m pytest tests/ -v --cov=backend --cov=app --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ============================================================================
  # .NET Frontend Build
  # ============================================================================
  dotnet-build:
    name: .NET Build
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore VoiceStudio.sln
      
      - name: Build
        run: dotnet build VoiceStudio.sln -c Release -p:Platform=x64 --no-restore
      
      - name: Run tests
        run: dotnet test src/VoiceStudio.App.Tests/VoiceStudio.App.Tests.csproj -c Release -p:Platform=x64 --no-build --verbosity normal
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voicestudio-build
          path: src/VoiceStudio.App/bin/x64/Release/

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [python-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v -m integration

  # ============================================================================
  # Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install safety
        run: pip install safety bandit
      
      - name: Check dependencies for vulnerabilities
        run: |
          pip install -r requirements.txt
          safety check --full-report || true
      
      - name: Run Bandit security scanner
        run: bandit -r backend app -ll -ii

  # ============================================================================
  # Code Quality
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install tools
        run: |
          pip install ruff black isort
      
      - name: Check formatting with Black
        run: black --check backend app tests
      
      - name: Check imports with isort
        run: isort --check-only backend app tests
      
      - name: Lint with Ruff
        run: ruff check backend app tests
