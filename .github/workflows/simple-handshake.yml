name: simple-handshake
on:
  schedule: [{ cron: "*/15 * * * *" }]  # every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  status:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      STATUS_EMAIL_FROM: ${{ secrets.STATUS_EMAIL_FROM }}
      STATUS_EMAIL_TO: ${{ secrets.STATUS_EMAIL_TO }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Build 60s status (auto)
        run: |
          WIN="${WIN:-15}"
          mkdir -p docs
          COMMITS="$(git log --since "${WIN} minutes ago" --pretty=format:'%h %s (by %an)' || true)"
          [ -n "$COMMITS" ] || COMMITS="— No commits in this window."
          TS="$(date -u +'%Y-%m-%d %H:%MZ')"
          {
            echo "## ${TS}"
            echo
            echo "1) What changed since last check-in:"
            echo "$COMMITS"
            echo
            echo "2) What's next from the plan:"
            echo "— Update docs/START_HERE_EXACT_PLAN.md → 'Next' bullets"
            echo
            echo "3) Blockers / decisions needed:"
            echo "— None"
            echo
            echo "---"
            echo
          } > NEW_STATUS.md

          [ -f docs/HANDSHAKE_STATUS.md ] || touch docs/HANDSHAKE_STATUS.md
          cat NEW_STATUS.md docs/HANDSHAKE_STATUS.md | head -c 200000 > docs/HANDSHAKE_STATUS.md

      - name: Commit & push if changed
        run: |
          git config user.name  "VS Handshake Bot"
          git config user.email "bot@users.noreply.github.com"
          if ! git diff --quiet -- docs/HANDSHAKE_STATUS.md; then
            git add docs/HANDSHAKE_STATUS.md
            git commit -m "handshake: 60s status [skip ci]"
            git push
          else
            echo "No change; nothing to commit."
          fi

      - name: Optional Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"VoiceStudio Handshake: $(cat NEW_STATUS.md | head -5 | tail -4 | tr '\n' ' ')\"}" \
            $SLACK_WEBHOOK_URL || echo "Slack notification failed"

      - name: Optional email notification (hourly)
        if: env.SENDGRID_API_KEY != '' && env.STATUS_EMAIL_FROM != '' && env.STATUS_EMAIL_TO != ''
        run: |
          # Only send email on the hour (every 60 minutes)
          MIN=$(date +%M)
          if [ "$MIN" = "00" ]; then
            curl -X POST "https://api.sendgrid.com/v3/mail/send" \
              -H "Authorization: Bearer $SENDGRID_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"personalizations\":[{\"to\":[{\"email\":\"$STATUS_EMAIL_TO\"}]}],\"from\":{\"email\":\"$STATUS_EMAIL_FROM\",\"name\":\"VS Handshake\"},\"subject\":\"VoiceStudio Hourly Status\",\"content\":[{\"type\":\"text/plain\",\"value\":\"$(cat NEW_STATUS.md)\"}]}" || echo "Email notification failed"
          else
            echo "Skipping email (not on the hour)"
          fi
