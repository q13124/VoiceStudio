name: simple-handshake
on:
  schedule: [{ cron: "*/15 * * * *" }]  # every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Build 60s status (auto)
        run: |
          WIN="${WIN:-15}"
          mkdir -p docs
          COMMITS="$(git log --since "${WIN} minutes ago" --pretty=format:'%h %s (by %an)' || true)"
          [ -n "$COMMITS" ] || COMMITS="— No commits in this window."
          TS="$(date -u +'%Y-%m-%d %H:%MZ')"
          {
            echo "## ${TS}"
            echo
            echo "1) What changed since last check-in:"
            echo "$COMMITS"
            echo
            echo "2) What's next from the plan:"
            echo "— Update docs/START_HERE_EXACT_PLAN.md → 'Next' bullets"
            echo
            echo "3) Blockers / decisions needed:"
            echo "— None"
            echo
            echo "---"
            echo
          } > NEW_STATUS.md

          [ -f docs/HANDSHAKE_STATUS.md ] || touch docs/HANDSHAKE_STATUS.md
          cat NEW_STATUS.md docs/HANDSHAKE_STATUS.md | head -c 200000 > docs/HANDSHAKE_STATUS.md

      - name: Commit & push if changed
        run: |
          git config user.name  "VS Handshake Bot"
          git config user.email "bot@users.noreply.github.com"
          if ! git diff --quiet -- docs/HANDSHAKE_STATUS.md; then
            git add docs/HANDSHAKE_STATUS.md
            git commit -m "handshake: 60s status [skip ci]"
            git push
          else
            echo "No change; nothing to commit."
          fi
