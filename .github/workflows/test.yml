name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test-backend:
    name: Test Python Backend
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements_engines.txt ]; then pip install -r requirements_engines.txt; fi
          
      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=backend --cov-report=xml --cov-report=html
        continue-on-error: true
        
      - name: Run integration tests
        run: |
          pytest tests/integration/ -v
        continue-on-error: true
        
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  test-frontend:
    name: Test C# Frontend
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build solution
        run: dotnet build --configuration Release --no-restore
        
      - name: Run unit tests
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"
        continue-on-error: true
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: '**/TestResults/**/*'
          retention-days: 7

  test-quality:
    name: Quality Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install quality check tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          
      - name: Check for placeholders
        run: |
          if [ -f tests/quality/verify_no_placeholders.py ]; then
            python tests/quality/verify_no_placeholders.py
          elif [ -f tests/quality/verify_no_placeholders_improved.py ]; then
            python tests/quality/verify_no_placeholders_improved.py
          else
            echo "Placeholder verification script not found, skipping..."
          fi
        continue-on-error: true
        
      - name: Verify no TODO/FIXME in code
        run: |
          echo "Checking for forbidden patterns..."
          if grep -r "TODO\|FIXME\|PLACEHOLDER\|NotImplementedException\|NotImplementedError" --include="*.py" --include="*.cs" --include="*.xaml" --exclude-dir=".git" --exclude-dir=".venv" --exclude-dir="node_modules" .; then
            echo "Found forbidden patterns in code!"
            exit 1
          else
            echo "No forbidden patterns found."
          fi
        continue-on-error: true

  test-old-project-integration:
    name: Old Project Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
          if [ -f requirements_missing_libraries.txt ]; then
            echo "Installing old project libraries (may take time)..."
            pip install -r requirements_missing_libraries.txt || echo "Some libraries may not be available, tests will skip"
          fi
          
      - name: Run old project integration tests
        run: |
          pytest tests/integration/old_project/ -v --tb=short
        continue-on-error: true

