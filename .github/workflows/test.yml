name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test-backend:
    name: Test Python Backend
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements_engines.txt ]; then pip install -r requirements_engines.txt; fi
          
      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=backend --cov-report=xml --cov-report=html
        # NOTE: Critical tests - failures will block the workflow
        
      - name: Run integration tests
        run: |
          pytest tests/integration/ -v
        # NOTE: Critical tests - failures will block the workflow
        
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  test-frontend:
    name: Test C# Frontend (${{ matrix.configuration }})
    runs-on: windows-latest
    
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Restore dependencies
        run: dotnet restore VoiceStudio.sln
        
      - name: Build solution (${{ matrix.configuration }})
        run: dotnet build VoiceStudio.sln -c ${{ matrix.configuration }} -p:Platform=${{ matrix.platform }} --no-restore
        
      - name: Run unit tests (${{ matrix.configuration }})
        run: dotnet test src/VoiceStudio.App.Tests/VoiceStudio.App.Tests.csproj -c ${{ matrix.configuration }} -p:Platform=${{ matrix.platform }} --no-build --verbosity normal --collect:"XPlat Code Coverage" --filter "TestCategory!=Smoke"
        # NOTE: Critical tests - failures will block the workflow
        
      - name: Run smoke tests (${{ matrix.configuration }})
        run: dotnet test src/VoiceStudio.App.Tests/VoiceStudio.App.Tests.csproj -c ${{ matrix.configuration }} -p:Platform=${{ matrix.platform }} --no-build --verbosity normal --filter "TestCategory=Smoke"
        timeout-minutes: 10
        # NOTE: Smoke tests verify panel navigation (34+ panels)
        
      - name: Install ReportGenerator
        if: matrix.configuration == 'Release'
        run: dotnet tool install -g dotnet-reportgenerator-globaltool
        
      - name: Generate coverage report
        if: matrix.configuration == 'Release'
        run: |
          reportgenerator "-reports:**/TestResults/**/coverage.cobertura.xml" "-targetdir:.buildlogs/coverage" "-reporttypes:Html;Cobertura;TextSummary"
        continue-on-error: true
        
      - name: Display coverage summary
        if: matrix.configuration == 'Release'
        run: |
          if (Test-Path ".buildlogs/coverage/Summary.txt") {
            Get-Content ".buildlogs/coverage/Summary.txt"
          } else {
            Write-Host "Coverage summary not generated"
          }
        shell: pwsh
        continue-on-error: true
        
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.configuration == 'Release'
        with:
          name: coverage-report
          path: .buildlogs/coverage/
          retention-days: 30
        continue-on-error: true
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results-${{ matrix.configuration }}
          path: '**/TestResults/**/*'
          retention-days: 7

  test-quality:
    name: Quality Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install quality check tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          
      - name: Check for placeholders
        run: |
          if [ -f tests/quality/verify_no_placeholders.py ]; then
            python tests/quality/verify_no_placeholders.py
          elif [ -f tests/quality/verify_no_placeholders_improved.py ]; then
            python tests/quality/verify_no_placeholders_improved.py
          else
            echo "Placeholder verification script not found, skipping..."
          fi
        # Placeholder check should fail if placeholders found
        
      - name: Verify no TODO/FIXME in code
        run: |
          echo "Checking for forbidden patterns..."
          if grep -r "TODO\|FIXME\|PLACEHOLDER\|NotImplementedException\|NotImplementedError" --include="*.py" --include="*.cs" --include="*.xaml" --exclude-dir=".git" --exclude-dir=".venv" --exclude-dir="node_modules" .; then
            echo "Found forbidden patterns in code!"
            exit 1
          else
            echo "No forbidden patterns found."
          fi
        continue-on-error: true

  test-old-project-integration:
    name: Old Project Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
          if [ -f requirements_missing_libraries.txt ]; then
            echo "Installing old project libraries (may take time)..."
            pip install -r requirements_missing_libraries.txt || echo "Some libraries may not be available, tests will skip"
          fi
          
      - name: Run old project integration tests
        run: |
          pytest tests/integration/old_project/ -v --tb=short
        # Old project integration tests should pass before merging

  xaml-lint:
    name: XAML Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: XAML Page Count Check
        run: |
          if [ -f scripts/check_xaml_page_count.py ]; then
            python scripts/check_xaml_page_count.py
          else
            echo "XAML page count check script not found, skipping..."
          fi
          
      - name: Hardcoded Colors Check
        run: |
          if [ -f scripts/check_hardcoded_colors.py ]; then
            python scripts/check_hardcoded_colors.py --strict || echo "Found hardcoded colors (advisory)"
          else
            echo "Hardcoded colors check script not found, skipping..."
          fi
        continue-on-error: true
        
      - name: Check for WPF-only Syntax (StringFormat, etc.)
        run: |
          echo "Checking for WPF-only XAML syntax..."
          if grep -r "StringFormat=" --include="*.xaml" src/ 2>/dev/null; then
            echo "ERROR: Found StringFormat in XAML bindings - not supported in WinUI!"
            exit 1
          fi
          echo "No WPF-only syntax found."

  test-integration-with-backend:
    name: Integration Tests (with Backend)
    runs-on: ubuntu-latest
    needs: [test-backend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn httpx
          
      - name: Start backend server
        run: |
          python -m uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          curl -f http://localhost:8000/health || exit 1
        env:
          VOICESTUDIO_DEBUG: "true"
          
      - name: Run integration tests
        run: |
          BACKEND_AVAILABLE=true pytest tests/integration/backend_frontend/ -v --tb=short
        # NOTE: Integration tests are now blocking - failures will block the workflow
        
      - name: Run E2E workflow tests
        run: |
          pytest tests/e2e/ -v --tb=short
        timeout-minutes: 15
        # NOTE: E2E tests are blocking - failures will block the workflow
        
      - name: Stop backend server
        if: always()
        run: |
          pkill -f "uvicorn backend.api.main" || true

  verify-gates:
    name: Verify Gate Status and Ledger
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run verification checks
        run: python scripts/run_verification.py
        
      - name: Upload verification report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-report
          path: .buildlogs/verification/last_run.json
          retention-days: 30

