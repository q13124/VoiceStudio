name: test-handshake
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Test handshake script
        run: |
          python - << 'PY'
          import os, subprocess, pathlib, datetime, json
          win = int(os.getenv('WINDOW_MINUTES','15'))
          def sh(*a): return subprocess.check_output(list(a), text=True).strip()

          # Test git log
          try:
              commits = sh("git","log","--since",f"{win} minutes ago","--pretty=format:%h %s (by %an)")
          except Exception as e:
              commits = f"— Could not read git log: {e}"
          commits = commits or "— No commits in this window."

          print("Git log test:", commits[:100])
          print("Script test: PASSED")
          PY

      - name: Test file operations
        run: |
          mkdir -p docs
          echo "Test message" > status.msg
          echo "## $(date -u +'%Y-%m-%d %H:%MZ')" > docs/HANDSHAKE_STATUS.md
          echo "Test status" >> docs/HANDSHAKE_STATUS.md
          echo "---" >> docs/HANDSHAKE_STATUS.md
          echo "File operations test: PASSED"

      - name: Test git operations
        run: |
          git config user.name "VS Handshake Bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/HANDSHAKE_STATUS.md
          git commit -m "test: handshake workflow test [skip ci]" || echo "No changes to commit"
          echo "Git operations test: PASSED"
