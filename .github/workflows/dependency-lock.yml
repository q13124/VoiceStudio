name: Dependency Lock Check

on:
  push:
    branches: [ main, develop ]
    paths: [ 'requirements.in' ]
  pull_request:
    branches: [ main ]
    paths: [ 'requirements.in' ]

jobs:
  lock-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install pip-tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-tools

    - name: Generate requirements.txt
      run: |
        pip-compile requirements.in --output-file requirements-generated.txt

    - name: Check if requirements.txt is up to date
      run: |
        if ! diff requirements.txt requirements-generated.txt; then
          echo "requirements.txt is out of date!"
          echo "Run 'pip-compile requirements.in' to update it."
          exit 1
        fi

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Generate lockfile with uv (no upgrade)
      run: bash tooling/lock/generate_uv_lock.sh

    - name: Verify lockfile drift
      run: git diff --exit-code -- requirements.lock.txt

    - name: Install from lockfile
      run: pip install --require-hashes -r requirements.lock.txt

    - name: Upload lockfile
      uses: actions/upload-artifact@v3
      with:
        name: requirements-lock
        path: requirements.lock.txt

    - name: Clean up
      run: rm requirements-generated.txt
