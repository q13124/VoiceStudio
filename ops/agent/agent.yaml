server:
  log_level: info

prometheus:
  wal_directory: /tmp/agent-wal
  global:
    scrape_interval: 30s
  configs:
    - name: default
      scrape_configs:
        - job_name: 'voicestudio_api'
          static_configs:
            - targets: ['voicestudio.local:8000']
        - job_name: 'sqlite_exporter'
          static_configs:
            - targets: ['localhost:8001']
      remote_write:
        - url: https://prometheus-remote-write.example/api/v1/write
          basic_auth:
            username: ${REMOTE_USER}
            password: ${REMOTE_PASS}
