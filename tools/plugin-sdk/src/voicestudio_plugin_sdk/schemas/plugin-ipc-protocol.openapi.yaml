openapi: 3.1.0
info:
  title: VoiceStudio Plugin IPC Protocol
  description: |
    OpenAPI 3.1 specification for the VoiceStudio plugin-host IPC protocol.
    
    This protocol enables bidirectional communication between the VoiceStudio
    host application and plugin subprocesses. It is based on JSON-RPC 2.0 with
    VoiceStudio-specific extensions.
    
    ## Transport
    
    Messages are transmitted over stdin/stdout pipes using length-prefixed
    JSON encoding:
    - 4-byte big-endian length prefix
    - UTF-8 encoded JSON message body
    
    ## Message Types
    
    1. **Request**: Expects a response (has `id` and `method`)
    2. **Response**: Reply to a request (has `id` and either `result` or `error`)
    3. **Notification**: Fire-and-forget (has `method` but no `id`)
    
    ## Directions
    
    - **Host → Plugin**: Lifecycle management, capability invocation
    - **Plugin → Host**: Service access (audio, storage, settings, engines)
    - **Bidirectional**: Notifications (logs, progress, heartbeat)
    
    Phase 5D M5: OpenAPI specification for documentation and SDK generation.
  version: 1.0.0
  contact:
    name: VoiceStudio Plugin Development
  license:
    name: MIT

servers:
  - url: ipc://localhost
    description: Local IPC transport (stdin/stdout pipes)

tags:
  - name: Lifecycle
    description: Plugin lifecycle management (host → plugin)
  - name: Capabilities
    description: Plugin capability invocation (host → plugin)
  - name: Audio
    description: Audio service access (plugin → host)
  - name: UI
    description: UI service access (plugin → host)
  - name: Storage
    description: Storage service access (plugin → host)
  - name: Settings
    description: Settings service access (plugin → host)
  - name: Engine
    description: Engine service access (plugin → host)
  - name: Notifications
    description: Bidirectional notifications

paths:
  /plugin.initialize:
    post:
      operationId: pluginInitialize
      tags: [Lifecycle]
      summary: Initialize the plugin
      description: |
        Initialize the plugin with configuration and permissions.
        This is the first method called after the subprocess starts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitializeParams'
      responses:
        '200':
          description: Plugin initialized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitializeResult'
        '400':
          $ref: '#/components/responses/RPCError'

  /plugin.shutdown:
    post:
      operationId: pluginShutdown
      tags: [Lifecycle]
      summary: Shutdown the plugin
      description: |
        Request graceful shutdown of the plugin.
        Plugin should clean up resources and exit.
      responses:
        '200':
          description: Shutdown acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  acknowledged:
                    type: boolean
                    example: true

  /plugin.activate:
    post:
      operationId: pluginActivate
      tags: [Lifecycle]
      summary: Activate the plugin
      description: Activate the plugin after initialization
      responses:
        '200':
          description: Plugin activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivateResult'

  /plugin.deactivate:
    post:
      operationId: pluginDeactivate
      tags: [Lifecycle]
      summary: Deactivate the plugin
      description: Deactivate the plugin (suspend without shutdown)
      responses:
        '200':
          description: Plugin deactivated

  /plugin.getCapabilities:
    post:
      operationId: pluginGetCapabilities
      tags: [Capabilities]
      summary: Get plugin capabilities
      description: Query the list of capabilities this plugin provides
      responses:
        '200':
          description: Capability list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilitiesResult'

  /plugin.invokeCapability:
    post:
      operationId: pluginInvokeCapability
      tags: [Capabilities]
      summary: Invoke a plugin capability
      description: Execute a specific capability with parameters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvokeCapabilityParams'
      responses:
        '200':
          description: Capability result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvokeCapabilityResult'
        '400':
          $ref: '#/components/responses/RPCError'

  /host.audio.play:
    post:
      operationId: hostAudioPlay
      tags: [Audio]
      summary: Play audio
      description: Request the host to play audio data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AudioPlayParams'
      responses:
        '200':
          description: Audio playback started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioPlayResult'
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /host.audio.stop:
    post:
      operationId: hostAudioStop
      tags: [Audio]
      summary: Stop audio playback
      responses:
        '200':
          description: Playback stopped

  /host.audio.getDevices:
    post:
      operationId: hostAudioGetDevices
      tags: [Audio]
      summary: List audio devices
      responses:
        '200':
          description: Device list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioDevicesResult'
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /host.audio.process:
    post:
      operationId: hostAudioProcess
      tags: [Audio]
      summary: Process audio data
      description: Send audio through the host's processing pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AudioProcessParams'
      responses:
        '200':
          description: Processed audio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioProcessResult'

  /host.ui.notify:
    post:
      operationId: hostUINotify
      tags: [UI]
      summary: Show notification
      description: Display a notification to the user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UINotifyParams'
      responses:
        '200':
          description: Notification shown
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /host.ui.showDialog:
    post:
      operationId: hostUIShowDialog
      tags: [UI]
      summary: Show dialog
      description: Display a dialog and wait for user response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UIShowDialogParams'
      responses:
        '200':
          description: Dialog result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UIDialogResult'
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /host.ui.updatePanel:
    post:
      operationId: hostUIUpdatePanel
      tags: [UI]
      summary: Update panel content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UIUpdatePanelParams'
      responses:
        '200':
          description: Panel updated
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /host.storage.get:
    post:
      operationId: hostStorageGet
      tags: [Storage]
      summary: Get stored value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorageGetParams'
      responses:
        '200':
          description: Retrieved value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageGetResult'
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /host.storage.set:
    post:
      operationId: hostStorageSet
      tags: [Storage]
      summary: Store value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorageSetParams'
      responses:
        '200':
          description: Value stored
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /host.storage.delete:
    post:
      operationId: hostStorageDelete
      tags: [Storage]
      summary: Delete stored value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorageDeleteParams'
      responses:
        '200':
          description: Value deleted
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /host.settings.get:
    post:
      operationId: hostSettingsGet
      tags: [Settings]
      summary: Get setting value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsGetParams'
      responses:
        '200':
          description: Setting value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsGetResult'
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /host.settings.set:
    post:
      operationId: hostSettingsSet
      tags: [Settings]
      summary: Set setting value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsSetParams'
      responses:
        '200':
          description: Setting updated
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /host.engine.invoke:
    post:
      operationId: hostEngineInvoke
      tags: [Engine]
      summary: Invoke engine capability
      description: Execute a capability on a specific engine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineInvokeParams'
      responses:
        '200':
          description: Engine result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineInvokeResult'
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /host.engine.list:
    post:
      operationId: hostEngineList
      tags: [Engine]
      summary: List available engines
      responses:
        '200':
          description: Engine list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineListResult'
        '403':
          $ref: '#/components/responses/PermissionDenied'

  /notify.log:
    post:
      operationId: notifyLog
      tags: [Notifications]
      summary: Log message
      description: |
        Send a log message (notification, no response expected).
        Bidirectional - can be sent by host or plugin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogNotification'
      responses:
        '204':
          description: Notification received (no response)

  /notify.progress:
    post:
      operationId: notifyProgress
      tags: [Notifications]
      summary: Progress update
      description: |
        Report progress on a long-running operation.
        Typically sent from plugin to host.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgressNotification'
      responses:
        '204':
          description: Notification received (no response)

  /notify.heartbeat:
    post:
      operationId: notifyHeartbeat
      tags: [Notifications]
      summary: Heartbeat signal
      description: |
        Keep-alive signal for health monitoring.
        Host sends to plugin periodically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HeartbeatNotification'
      responses:
        '204':
          description: Notification received (no response)

components:
  schemas:
    # Base JSON-RPC message types
    JsonRpcRequest:
      type: object
      required: [jsonrpc, id, method]
      properties:
        jsonrpc:
          type: string
          const: "2.0"
          description: JSON-RPC version
        id:
          oneOf:
            - type: integer
            - type: string
          description: Unique request identifier
        method:
          type: string
          description: Method name to invoke
        params:
          oneOf:
            - type: object
            - type: array
          description: Method parameters

    JsonRpcResponse:
      type: object
      required: [jsonrpc, id]
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          oneOf:
            - type: integer
            - type: string
        result:
          description: Success result (mutually exclusive with error)
        error:
          $ref: '#/components/schemas/JsonRpcError'

    JsonRpcNotification:
      type: object
      required: [jsonrpc, method]
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
        params:
          oneOf:
            - type: object
            - type: array

    JsonRpcError:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: Error code
        message:
          type: string
          description: Error message
        data:
          description: Additional error data

    # Error codes enumeration
    ErrorCode:
      type: integer
      enum:
        - -32700  # PARSE_ERROR
        - -32600  # INVALID_REQUEST
        - -32601  # METHOD_NOT_FOUND
        - -32602  # INVALID_PARAMS
        - -32603  # INTERNAL_ERROR
        - -32000  # PERMISSION_DENIED
        - -32001  # TIMEOUT
        - -32002  # PLUGIN_ERROR
        - -32003  # RESOURCE_LIMIT
        - -32004  # NOT_INITIALIZED
        - -32005  # ALREADY_INITIALIZED
        - -32006  # INVALID_STATE
        - -32007  # SHUTDOWN_IN_PROGRESS
        - -32008  # HOST_UNAVAILABLE
        - -32009  # SERIALIZATION_ERROR
      description: |
        Standard JSON-RPC error codes:
        - -32700: Parse error
        - -32600: Invalid request
        - -32601: Method not found
        - -32602: Invalid params
        - -32603: Internal error
        
        VoiceStudio-specific error codes:
        - -32000: Permission denied
        - -32001: Timeout
        - -32002: Plugin error
        - -32003: Resource limit exceeded
        - -32004: Not initialized
        - -32005: Already initialized
        - -32006: Invalid state
        - -32007: Shutdown in progress
        - -32008: Host unavailable
        - -32009: Serialization error

    # Lifecycle schemas
    InitializeParams:
      type: object
      required: [plugin_id]
      properties:
        plugin_id:
          type: string
          description: Unique plugin identifier
        permissions:
          type: object
          additionalProperties: true
          description: Permission grants for this plugin
        config:
          type: object
          additionalProperties: true
          description: Plugin configuration

    InitializeResult:
      type: object
      properties:
        status:
          type: string
          enum: [ready, error]
        version:
          type: string
          description: Plugin version
        capabilities:
          type: array
          items:
            type: string
          description: List of capability names

    ActivateResult:
      type: object
      properties:
        activated:
          type: boolean

    # Capability schemas
    CapabilitiesResult:
      type: object
      properties:
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/Capability'

    Capability:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Capability identifier
        description:
          type: string
        version:
          type: string
        parameters:
          type: object
          additionalProperties: true
          description: Parameter schema

    InvokeCapabilityParams:
      type: object
      required: [capability]
      properties:
        capability:
          type: string
          description: Capability name to invoke
        params:
          type: object
          additionalProperties: true
          description: Capability parameters

    InvokeCapabilityResult:
      type: object
      properties:
        result:
          description: Capability-specific result
        duration_ms:
          type: number
          description: Execution time in milliseconds

    # Audio schemas
    AudioPlayParams:
      type: object
      required: [data]
      properties:
        data:
          type: string
          format: byte
          description: Base64-encoded audio data
        format:
          type: string
          enum: [wav, mp3, ogg, flac]
          default: wav
        device_id:
          type: string
          description: Target audio device

    AudioPlayResult:
      type: object
      properties:
        playback_id:
          type: string
          description: Identifier for controlling playback
        duration_ms:
          type: number

    AudioDevicesResult:
      type: object
      properties:
        devices:
          type: array
          items:
            $ref: '#/components/schemas/AudioDevice'

    AudioDevice:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [input, output]
        is_default:
          type: boolean

    AudioProcessParams:
      type: object
      required: [data]
      properties:
        data:
          type: string
          format: byte
          description: Base64-encoded audio data
        operations:
          type: array
          items:
            type: string
          description: Processing operations to apply

    AudioProcessResult:
      type: object
      properties:
        data:
          type: string
          format: byte
          description: Processed audio data
        duration_ms:
          type: number

    # UI schemas
    UINotifyParams:
      type: object
      required: [message]
      properties:
        message:
          type: string
        level:
          type: string
          enum: [info, success, warning, error]
          default: info
        duration_ms:
          type: integer
          default: 3000

    UIShowDialogParams:
      type: object
      required: [title]
      properties:
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [info, confirm, input, custom]
          default: info
        buttons:
          type: array
          items:
            type: string

    UIDialogResult:
      type: object
      properties:
        button:
          type: string
          description: Button clicked
        input:
          type: string
          description: User input (for input dialogs)

    UIUpdatePanelParams:
      type: object
      required: [panel_id, content]
      properties:
        panel_id:
          type: string
        content:
          type: object
          additionalProperties: true

    # Storage schemas
    StorageGetParams:
      type: object
      required: [key]
      properties:
        key:
          type: string
        namespace:
          type: string
          default: default

    StorageGetResult:
      type: object
      properties:
        value:
          description: Stored value (any JSON type)
        exists:
          type: boolean

    StorageSetParams:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          description: Value to store
        namespace:
          type: string
          default: default

    StorageDeleteParams:
      type: object
      required: [key]
      properties:
        key:
          type: string
        namespace:
          type: string
          default: default

    # Settings schemas
    SettingsGetParams:
      type: object
      required: [key]
      properties:
        key:
          type: string
        scope:
          type: string
          enum: [plugin, user, system]
          default: plugin

    SettingsGetResult:
      type: object
      properties:
        value:
          description: Setting value
        exists:
          type: boolean

    SettingsSetParams:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          description: Setting value
        scope:
          type: string
          enum: [plugin, user]
          default: plugin

    # Engine schemas
    EngineInvokeParams:
      type: object
      required: [engine_id, capability]
      properties:
        engine_id:
          type: string
          description: Target engine identifier
        capability:
          type: string
          description: Engine capability to invoke
        params:
          type: object
          additionalProperties: true

    EngineInvokeResult:
      type: object
      properties:
        result:
          description: Engine-specific result
        duration_ms:
          type: number

    EngineListResult:
      type: object
      properties:
        engines:
          type: array
          items:
            $ref: '#/components/schemas/EngineInfo'

    EngineInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [tts, stt, audio_processing]
        capabilities:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [available, busy, unavailable]

    # Notification schemas
    LogNotification:
      type: object
      required: [level, message]
      properties:
        level:
          type: string
          enum: [debug, info, warning, error]
        message:
          type: string
        context:
          type: object
          additionalProperties: true

    ProgressNotification:
      type: object
      required: [operation_id]
      properties:
        operation_id:
          type: string
        progress:
          type: number
          minimum: 0
          maximum: 100
        message:
          type: string
        status:
          type: string
          enum: [running, completed, failed, cancelled]

    HeartbeatNotification:
      type: object
      properties:
        timestamp:
          type: number
          description: Unix timestamp

  responses:
    RPCError:
      description: JSON-RPC error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonRpcResponse'
          example:
            jsonrpc: "2.0"
            id: 1
            error:
              code: -32602
              message: "Invalid params"
              data: "Missing required parameter: capability"

    PermissionDenied:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonRpcResponse'
          example:
            jsonrpc: "2.0"
            id: 1
            error:
              code: -32000
              message: "Permission denied: audio.play"
              data:
                required_permission: "audio.play"
