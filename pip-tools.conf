# pip-tools configuration for VoiceStudio Voice Engine Router
# 
# Usage:
# 1. Install pip-tools: pip install pip-tools
# 2. Lock dependencies: pip-compile requirements.in
# 3. Install locked dependencies: pip-sync requirements.txt
# 4. Update dependencies: pip-compile --upgrade requirements.in
#
# This ensures reproducible builds across environments

# Configuration options
--index-url https://pypi.org/simple/
--extra-index-url https://download.pytorch.org/whl/cpu
--extra-index-url https://download.pytorch.org/whl/cu118

# Generate hashes for security
--generate-hashes

# Output format
--output-file requirements.txt
--header

# Include development dependencies
--dev
