<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceStudio Router Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ---------- Types ----------
        const pct = (x) => `${Math.round(x * 100)}%`;
        const cls = (...parts) => parts.filter(Boolean).join(" ");

        function Bar({ value }) {
            return React.createElement("div", {
                className: "h-2 w-full rounded bg-gray-200 overflow-hidden"
            }, React.createElement("div", {
                className: "h-2 bg-blue-500",
                style: { width: pct(Math.max(0, Math.min(1, value))) }
            }));
        }

        function Pill({ children, tone = "default" }) {
            const map = {
                default: "bg-gray-100 text-gray-700",
                good: "bg-green-100 text-green-800",
                bad: "bg-red-100 text-red-800",
                warn: "bg-amber-100 text-amber-800",
            };
            return React.createElement("span", {
                className: cls("px-2 py-0.5 rounded text-xs font-medium", map[tone])
            }, children);
        }

        // ---------- Engine Status Grid ----------
        function EngineStatusGrid({ baseUrl }) {
            const [health, setHealth] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            async function load() {
                setLoading(true);
                setError(null);
                try {
                    const r = await fetch(`${baseUrl}/health`);
                    if (!r.ok) throw new Error(`/health -> ${r.status}`);
                    const js = await r.json();
                    setHealth(js);
                } catch (e) {
                    setError(e.message || String(e));
                } finally {
                    setLoading(false);
                }
            }

            useEffect(() => {
                load();
                const id = setInterval(load, 5000);
                return () => clearInterval(id);
            }, [baseUrl]);

            const engines = useMemo(() => Object.entries(health?.engines || {}), [health]);

            return React.createElement("div", { className: "space-y-3" },
                React.createElement("div", { className: "flex items-center justify-between" },
                    React.createElement("h2", { className: "text-lg font-semibold" }, "Engines"),
                    React.createElement("button", {
                        onClick: load,
                        className: "px-3 py-1.5 text-sm rounded bg-gray-900 text-white disabled:opacity-60",
                        disabled: loading
                    }, loading ? "Refreshing…" : "Refresh")
                ),
                error && React.createElement("div", {
                    className: "text-sm text-red-700 bg-red-50 border border-red-200 rounded p-2"
                }, error),
                React.createElement("div", { className: "grid md:grid-cols-2 lg:grid-cols-3 gap-3" },
                    engines.map(([id, info]) =>
                        React.createElement("div", {
                            key: id,
                            className: "border rounded-lg p-3 bg-white shadow-sm"
                        },
                            React.createElement("div", { className: "flex items-center justify-between gap-2" },
                                React.createElement("div", { className: "font-medium" }, id),
                                info.healthy ?
                                    React.createElement(Pill, { tone: "good" }, "Healthy") :
                                    React.createElement(Pill, { tone: "bad" }, "Down")
                            ),
                            React.createElement("div", { className: "mt-2 text-xs text-gray-600" }, "Load"),
                            React.createElement(Bar, { value: info.load }),
                            React.createElement("div", { className: "mt-2 text-xs text-gray-600" }, "Languages"),
                            React.createElement("div", { className: "mt-1 flex flex-wrap gap-1" },
                                info.languages.slice(0, 12).map((l) =>
                                    React.createElement(Pill, { key: l }, l)
                                )
                            ),
                            React.createElement("div", { className: "mt-2 text-xs text-gray-600" }, "Tiers"),
                            React.createElement("div", { className: "mt-1 flex gap-1" },
                                info.quality.map((q) =>
                                    React.createElement(Pill, { key: q }, q)
                                )
                            )
                        )
                    )
                )
            );
        }

        // ---------- TTS Demo ----------
        function TTSDemo({ baseUrl }) {
            const [text, setText] = useState("Hello from VoiceStudio Router");
            const [language, setLanguage] = useState("en");
            const [quality, setQuality] = useState("balanced");
            const [busy, setBusy] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const [result, setResult] = useState(null);
            const [err, setErr] = useState(null);

            async function run() {
                setBusy(true);
                setErr(null);
                setAudioUrl(null);
                try {
                    const r = await fetch(`${baseUrl}/tts`, {
                        method: "POST",
                        headers: { "content-type": "application/json" },
                        body: JSON.stringify({
                            text, language, quality,
                            voice_profile: {},
                            params: { sample_rate: 22050 },
                            mode: "sync"
                        }),
                    });
                    if (!r.ok) throw new Error(`/tts -> ${r.status}`);
                    const js = await r.json();
                    setResult(js);
                    if (js.result_b64_wav) {
                        const b = atob(js.result_b64_wav);
                        const arr = new Uint8Array(b.length);
                        for (let i = 0; i < b.length; i++) arr[i] = b.charCodeAt(i);
                        const url = URL.createObjectURL(new Blob([arr], { type: "audio/wav" }));
                        setAudioUrl(url);
                    }
                } catch (e) {
                    setErr(e.message || String(e));
                } finally {
                    setBusy(false);
                }
            }

            return React.createElement("div", { className: "space-y-3" },
                React.createElement("h2", { className: "text-lg font-semibold" }, "Quick TTS"),
                React.createElement("div", { className: "grid gap-3 md:grid-cols-2" },
                    React.createElement("div", { className: "space-y-2" },
                        React.createElement("label", { className: "text-sm font-medium" }, "Text"),
                        React.createElement("textarea", {
                            className: "w-full border rounded p-2 min-h-[96px]",
                            value: text,
                            onChange: (e) => setText(e.target.value)
                        })
                    ),
                    React.createElement("div", { className: "grid gap-2 content-start" },
                        React.createElement("label", { className: "text-sm font-medium" }, "Language"),
                        React.createElement("input", {
                            className: "border rounded p-2",
                            value: language,
                            onChange: (e) => setLanguage(e.target.value)
                        }),
                        React.createElement("label", { className: "text-sm font-medium mt-2" }, "Quality"),
                        React.createElement("select", {
                            className: "border rounded p-2",
                            value: quality,
                            onChange: (e) => setQuality(e.target.value)
                        },
                            React.createElement("option", { value: "fast" }, "fast"),
                            React.createElement("option", { value: "balanced" }, "balanced"),
                            React.createElement("option", { value: "quality" }, "quality")
                        ),
                        React.createElement("button", {
                            onClick: run,
                            disabled: busy,
                            className: "mt-3 px-3 py-2 rounded bg-blue-600 text-white disabled:opacity-60"
                        }, busy ? "Generating…" : "Generate")
                    )
                ),
                err && React.createElement("div", {
                    className: "text-sm text-red-700 bg-red-50 border border-red-200 rounded p-2"
                }, err),
                result && React.createElement("div", { className: "border rounded p-3 bg-white" },
                    React.createElement("div", { className: "text-sm text-gray-700" },
                        "Engine: ", React.createElement("b", {}, result.engine)
                    ),
                    React.createElement("div", { className: "text-xs text-gray-500 mt-1" },
                        "Tried: ", result.tried_order?.join(" → ")
                    ),
                    audioUrl && React.createElement("div", { className: "mt-3" },
                        React.createElement("audio", {
                            controls: true,
                            src: audioUrl,
                            className: "w-full"
                        })
                    )
                )
            );
        }

        // ---------- App Shell ----------
        function App() {
            const [baseUrl, setBaseUrl] = useState("http://127.0.0.1:5090");

            return React.createElement("div", { className: "min-h-screen bg-gray-50 text-gray-900" },
                React.createElement("div", { className: "max-w-6xl mx-auto p-4 md:p-8 space-y-6" },
                    React.createElement("header", { className: "flex items-center justify-between" },
                        React.createElement("h1", { className: "text-2xl md:text-3xl font-bold" }, "VoiceStudio — Router Dashboard"),
                        React.createElement("div", { className: "flex items-center gap-2" },
                            React.createElement("input", {
                                className: "border rounded px-2 py-1 text-sm w-[260px]",
                                value: baseUrl,
                                onChange: (e) => setBaseUrl(e.target.value),
                                title: "Router base URL"
                            }),
                            React.createElement(Pill, {}, `Base: ${baseUrl}`)
                        )
                    ),
                    React.createElement(EngineStatusGrid, { baseUrl }),
                    React.createElement("div", { className: "grid lg:grid-cols-2 gap-6" },
                        React.createElement(TTSDemo, { baseUrl }),
                        React.createElement("div", { className: "space-y-3" },
                            React.createElement("h2", { className: "text-lg font-semibold" }, "Queue (placeholder)"),
                            React.createElement("div", {
                                className: "border rounded-lg p-3 bg-white text-sm text-gray-600"
                            }, "WebSocket progress will appear here once async jobs are enabled.")
                        )
                    ),
                    React.createElement("footer", { className: "pt-6 text-xs text-gray-500" },
                        "Router endpoints: ",
                        React.createElement("code", {}, "/health"),
                        ", ",
                        React.createElement("code", {}, "/engines"),
                        ", ",
                        React.createElement("code", {}, "/tts"),
                        ", ",
                        React.createElement("code", {}, "/abtest")
                    )
                )
            );
        }

        // Render the app
        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>
</html>
