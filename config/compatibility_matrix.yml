# VoiceStudio Compatibility Matrix
# Version: 1.0.0
# Last Updated: 2026-02-02
# Purpose: Centralized version pins, dependency constraints, and protected surfaces
# 
# This file is the single source of truth for version compatibility.
# Changes to this file require Overseer (Role 0) approval.
# See docs/developer/COMPATIBILITY_MATRIX_GUIDE.md for usage.

version: "1.0.0"
last_updated: "2026-02-02"

# ==============================================================================
# Platform Requirements
# ==============================================================================
platform:
  dotnet_sdk: "8.0.417"  # From global.json
  target_framework: "net8.0-windows10.0.19041.0"
  windows_sdk_min: "10.0.17763.0"  # Minimum supported
  windows_sdk_build_tools: "10.0.26100.4654"
  python_runtime: ">=3.10.15,<3.13"  # Recommended: 3.11.9
  python_recommended: "3.11.9"

# ==============================================================================
# Python Dependencies (LOCKED - Do not modify without testing)
# ==============================================================================
dependencies:
  python:
    # Core ML/AI Stack (CRITICAL - these versions are interdependent)
    torch:
      version: "2.2.2+cu121"
      index_url: "https://download.pytorch.org/whl/cu121"
      reason: "Baseline for XTTS v2 and all engine compatibility"
      tech_debt: null
    torchaudio:
      version: "2.2.2+cu121"
      reason: "Must match torch exactly"
      tech_debt: null
    transformers:
      version: "4.55.4"
      reason: "Stable with XTTS v2 and PyTorch 2.2.2"
      tech_debt: null
    huggingface_hub:
      version: "0.36.0"
      reason: "Matches Transformers 4.55+ API"
      tech_debt: null
    tokenizers:
      version: "0.21.4"
      reason: "Required by Transformers 4.55"
      tech_debt: null
    safetensors:
      version: "0.6.2"
      reason: "Fast checkpoint I/O"
      tech_debt: null
    
    # Audio Processing (LOCKED - DO NOT UPGRADE)
    librosa:
      version: "0.11.0"
      reason: "librosa >0.11.0 breaks PyTorch 2.2.2 compatibility"
      locked: true
      tech_debt: null
    numpy:
      version: "1.26.4"
      reason: "Bridge between PyTorch 2.2.2 and Librosa 0.11"
      locked: true
      tech_debt: null
    soundfile:
      version: "0.12.1"
      reason: "WAV/FLAC I/O"
      tech_debt: null
    faster_whisper:
      version: "1.2.0"
      reason: "GPU-ready Whisper variant, compatible with PyTorch 2.2.2"
      tech_debt: null
    
    # TTS Engines
    coqui_tts:
      version: "0.27.2"
      reason: "Current release with XTTS v2 engine"
      tech_debt: null
    piper_tts:
      version: ">=1.0.0"
      reason: "Lightweight TTS"
      tech_debt: null
    
    # Known Incompatibilities (document, don't enforce)
    chatterbox:
      version: "requires torch>=2.6"
      status: "INCOMPATIBLE"
      reason: "Cannot run in main venv; requires separate venv"
      tech_debt: "TD-001"
    
    # Backend Framework
    fastapi:
      version: ">=0.109.0"
      reason: "Backend API framework"
      tech_debt: null
    pydantic:
      version: ">=2.5.0"
      reason: "Data validation"
      tech_debt: null
    uvicorn:
      version: ">=0.27.0"
      reason: "ASGI server"
      tech_debt: null
    
    # Security Constraints
    protobuf:
      version: ">=5.28.3"
      reason: "CVE-2024-7254 fix"
      tech_debt: "TD-003"
    
    # Quality Metrics (CRITICAL for SLO-6)
    pesq:
      version: ">=0.0.4"
      reason: "Perceptual speech quality"
      tech_debt: null
    pystoi:
      version: ">=0.3.3"
      reason: "Short-time objective intelligibility"
      tech_debt: null

  # .NET Dependencies
  dotnet:
    windows_app_sdk:
      version: "1.8.251106002"
      reason: "WinUI 3 framework"
      tech_debt: null
    community_toolkit_winui:
      version: "7.1.2"
      reason: "UI controls"
      tech_debt: null
    community_toolkit_mvvm:
      version: "8.2.2"
      reason: "MVVM framework"
      tech_debt: null
    naudio:
      version: "2.2.1"
      reason: "Audio I/O"
      tech_debt: null
    microsoft_graphics_win2d:
      version: "1.3.2"
      reason: "2D graphics"
      tech_debt: null

# ==============================================================================
# API Contracts
# ==============================================================================
contracts:
  api:
    openapi_spec: "backend/api/openapi.json"
    base_url: "/api"
    
    # Core endpoints
    endpoints:
      health_preflight:
        path: "/api/health/preflight"
        method: "GET"
        response_schema: null
      voice_clone:
        path: "/api/voice/clone"
        method: "POST"
        request_schema: "shared/schemas/voice_clone_request.json"
      voice_synthesize:
        path: "/api/voice/synthesize"
        method: "POST"
        request_schema: null
      engines_list:
        path: "/api/engines"
        method: "GET"
        response_schema: null
  
  engines:
    base_protocol: "app/core/engines/base.py"
    manifest_schema: "shared/schemas/engine_manifest.schema.json"
    required_methods:
      - "synthesize"
      - "get_supported_sample_rates"
      - "get_supported_formats"
      - "health_check"

# ==============================================================================
# UI Invariants
# ==============================================================================
ui_invariants:
  design_tokens: "src/VoiceStudio.App/Resources/DesignTokens.xaml"
  panel_registry: "src/VoiceStudio.App/Services/PanelRegistry.cs"
  mvvm_base: "src/VoiceStudio.App/ViewModels/BaseViewModel.cs"
  
  patterns:
    # Panels must follow this naming
    view_suffix: "View.xaml"
    viewmodel_suffix: "ViewModel.cs"
    # Color tokens must be in DesignTokens.xaml
    color_token_location: "src/VoiceStudio.App/Resources/DesignTokens.xaml"

# ==============================================================================
# Protected Surfaces
# Modifications to these paths require Overseer approval
# ==============================================================================
protected_surfaces:
  - path: "global.json"
    owner: "Role 2 (Build & Tooling)"
    reason: ".NET SDK version"
    
  - path: "requirements.txt"
    owner: "Role 4 (Core Platform)"
    reason: "Core Python dependencies"
    
  - path: "requirements_engines.txt"
    owner: "Role 5 (Engine Engineer)"
    reason: "Engine dependencies - torch/numpy/librosa locks"
    
  - path: "version_lock.json"
    owner: "Role 0 (Overseer)"
    reason: "Canonical version pins"
    
  - path: "config/compatibility_matrix.yml"
    owner: "Role 0 (Overseer)"
    reason: "This file - compatibility source of truth"
    
  - path: "src/VoiceStudio.Core/**"
    owner: "Role 1 (System Architect)"
    reason: "Core contracts and interfaces"
    
  - path: "engines/**/*.json"
    owner: "Role 5 (Engine Engineer)"
    reason: "Engine manifests"
    
  - path: ".cursor/rules/**"
    owner: "Role 0 (Overseer)"
    reason: "Agent rules governance"
    
  - path: ".github/workflows/**"
    owner: "Role 2 (Build & Tooling)"
    reason: "CI/CD pipelines"
    
  - path: "Directory.Build.props"
    owner: "Role 2 (Build & Tooling)"
    reason: "Global .NET build configuration"
    
  - path: "Directory.Build.targets"
    owner: "Role 2 (Build & Tooling)"
    reason: "Global .NET build targets"

# ==============================================================================
# Validation Rules
# Commands to validate compliance with this matrix
# ==============================================================================
validation:
  dotnet:
    build_command: "dotnet build VoiceStudio.sln -c Debug -p:Platform=x64"
    test_command: "dotnet test src/VoiceStudio.App.Tests/VoiceStudio.App.Tests.csproj -c Debug -p:Platform=x64"
    
  python:
    test_command: "python -m pytest tests -v"
    lint_command: "ruff check backend app tools"
    
  gates:
    verification_script: "scripts/run_verification.py"
    matrix_check_script: "scripts/check_compatibility_matrix.py"

# ==============================================================================
# Change Log
# ==============================================================================
changelog:
  - date: "2026-02-02"
    change: "Initial matrix creation from Claude recommendations integration"
    author: "Overseer"
