global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'voicestudio_api'
    metrics_path: /metrics
    static_configs:
      - targets: ['voicestudio.local:8000']  # your API host:port

  - job_name: 'gpu_dcgm'
    static_configs:
      - targets: ['gpu-host-1:9400','gpu-host-2:9400']  # or k8s service
