# VoiceStudio Staging Environment Configuration
# Overrides for staging environment

# Staging-specific router settings
router:
  port: 5090
  debug: false
  log_level: "info"

# Staging web UI settings
web_ui:
  dev_server: false
  hot_reload: false
  debug_mode: false

# Staging security settings
security:
  rate_limits:
    api_requests_per_minute: 200
    clones_per_day_per_user: 100
  input_validation:
    max_text_length: 5000
  encryption:
    voice_profiles_at_rest: false

# Staging testing settings
testing:
  mock_engines: false
  unit_test_coverage_threshold: 70
  integration_test_timeout: 30
  e2e_test_timeout: 120

# Staging telemetry
telemetry:
  enabled: true
  retention_days: 14
  metrics_export:
    prometheus:
      enabled: true
      port: 9090

# Staging plugin settings
plugins:
  hot_reload: false
  debug_mode: false
