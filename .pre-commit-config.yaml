# VoiceStudio Unified Pre-Commit Configuration
# ==============================================
# This file consolidates all pre-commit hooks from:
# - Previous .pre-commit-config.yaml
# - scripts/hooks/pre-commit (bash script)
# - tools/git-hooks/pre-commit (shell script)
#
# Install: pre-commit install
# Run all: pre-commit run --all-files
# Run one: pre-commit run <hook-id>

repos:
  # ===========================================================================
  # Security Checks (from tools/git-hooks/pre-commit)
  # ===========================================================================
  - repo: local
    hooks:
      - id: check-secrets
        name: Check for Secrets/Credentials
        entry: python scripts/hooks/check_secrets.py
        language: system
        pass_filenames: true
        stages: [pre-commit]
        
      - id: check-env-files
        name: Block .env Files
        entry: python scripts/hooks/check_env_files.py
        language: system
        pass_filenames: true
        stages: [pre-commit]
        
      - id: check-large-files
        name: Check Large Files (>10MB)
        entry: python scripts/hooks/check_large_files.py
        language: system
        pass_filenames: true
        stages: [pre-commit]
        
      - id: check-conflict-markers
        name: Check Merge Conflict Markers
        entry: python scripts/hooks/check_conflict_markers.py
        language: system
        pass_filenames: true
        stages: [pre-commit]

  # ===========================================================================
  # Python Quality Checks
  # ===========================================================================
  - repo: local
    hooks:
      - id: python-syntax-check
        name: Python Syntax Check
        entry: python -m py_compile
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-commit]

      - id: python-import-check
        name: Validate Python Imports
        entry: python scripts/validate_imports.py
        language: system
        types: [python]
        pass_filenames: false
        
      - id: package-structure-check
        name: Validate Package Structure
        entry: python scripts/validate_package_structure.py
        language: system
        types: [python]
        pass_filenames: false
        
      - id: uncommitted-deps-check
        name: Audit Uncommitted Dependencies
        entry: python scripts/audit_uncommitted_dependencies.py
        language: system
        types: [python]
        pass_filenames: false

  # ===========================================================================
  # XAML Quality Checks (from scripts/hooks/pre-commit + existing)
  # ===========================================================================
  - repo: local
    hooks:
      - id: xaml-nested-views-check
        name: XAML Nested Views Check (GitHub #10947)
        entry: python scripts/hooks/check_xaml_nesting.py
        language: system
        types: [file]
        files: \.xaml$
        pass_filenames: true
        stages: [pre-commit]

      - id: xaml-safety-check
        name: XAML Safety Check
        entry: python scripts/lint_xaml.py
        language: system
        types: [xml]
        files: \.xaml$
        pass_filenames: true
        stages: [pre-commit]

      - id: xaml-resource-validation
        name: XAML Resource Validation
        entry: python scripts/validate_xaml_resources.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: (\.xaml$|Resources/.*\.xaml$)
        
      - id: xaml-quality
        name: XAML Quality Validation
        entry: python scripts/validate_xaml_quality.py --check resources
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: \.xaml$

  # ===========================================================================
  # C# Quality Checks
  # ===========================================================================
  - repo: local
    hooks:
      - id: no-empty-catch
        name: No Empty Catch Blocks
        entry: python scripts/check_empty_catches.py
        language: system
        types_or: [csharp, python]
        pass_filenames: true
        stages: [pre-commit]

  # ===========================================================================
  # Architecture Boundary Enforcement (ADR-008 Layer 3)
  # ===========================================================================
  - repo: local
    hooks:
      - id: architecture-boundary-check
        name: Architecture Boundary Check (ADR-008)
        entry: python scripts/check_architecture_boundaries.py --ci
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: \.(cs|py)$

  # ===========================================================================
  # Project Governance Checks
  # ===========================================================================
  - repo: local
    hooks:
      - id: completion-guard
        name: Completion Evidence Guard
        entry: python tools/overseer/verification/completion_guard.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: compatibility-matrix-check
        name: Compatibility Matrix Validation
        entry: python scripts/check_compatibility_matrix.py --local
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: ^(global\.json|requirements.*\.txt|version_lock\.json|Directory\.Build\.props|config/compatibility_matrix\.yml)$

      - id: contract-validation
        name: API Contract Validation
        entry: python scripts/check_contract_validation.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: (openapi\.json$|BackendClient\.g\.cs$|backend/api/.*\.py$)

  # C# formatting (dotnet format)
  - repo: local
    hooks:
      - id: dotnet-format
        name: Format C# Code
        entry: dotnet format VoiceStudio.sln --verbosity quiet --no-restore
        language: system
        types: [csharp]
        pass_filenames: false
        stages: [pre-commit]

  # Python linters (ruff) - Updated to latest
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        
  # Python formatter (black)
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        args: [--line-length=100]
        
  # Secret scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            \.buildlogs/.*|
            \.venv/.*|
            env/.*|
            runtime/external/.*|
            third_party/.*
          )$
