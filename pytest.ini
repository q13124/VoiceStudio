[pytest]
# Pytest configuration for VoiceStudio Quantum+
# Test discovery and execution settings

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --durations=10

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, require dependencies)
    e2e: End-to-end tests (slowest, require full system)
    slow: Slow running tests
    soak: Soak tests (long-running stability tests)
    requires_gpu: Tests that require GPU
    requires_engine: Tests that require specific engines
    requires_backend: Tests that require backend API running
    quality: Quality verification tests
    performance: Performance tests

# Minimum Python version
minversion = 6.0

# Asyncio configuration
asyncio_mode = auto

# Coverage options (when pytest-cov is used)
[coverage:run]
source = app,backend
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */.venv/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
# Minimum coverage threshold - fails if below this
# Phase 4 target: 95% coverage
fail_under = 95
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    assert False
    raise RuntimeError

