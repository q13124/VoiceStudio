[pytest]
# Pytest configuration for VoiceStudio Quantum+
# Test discovery and execution settings

# Python path - ensure project root modules are importable
pythonpath = .

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --durations=10

# UI test options (applied when running UI tests)
# Run with: pytest tests/ui -m ui --html=.buildlogs/ui_tests/report.html --self-contained-html
# Re-run options: pytest tests/ui -m ui --reruns 2 --reruns-delay 1

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, require dependencies)
    e2e: End-to-end tests (slowest, require full system)
    slow: Slow running tests
    soak: Soak tests (long-running stability tests)
    requires_gpu: Tests that require GPU
    requires_engine: Tests that require specific engines
    requires_backend: Tests that require backend API running
    requires_app: Tests that require the application to be running
    quality: Quality verification tests
    performance: Performance tests
    ui: UI tests (require WinAppDriver and application)
    smoke: Smoke tests (basic functionality)
    navigation: Navigation tests (panel switching)
    panel: Panel functionality tests
    keyboard: Keyboard interaction tests
    error_handling: Error handling and recovery tests
    backend_integration: UI tests that verify backend integration
    accessibility: Accessibility tests (a11y)
    a11y: Accessibility tests (alias)
    dialogs: Dialog and modal tests
    flaky: Tests that may be flaky due to timing
    visual: Visual regression tests
    viewmodel: ViewModel unit tests
    import: Audio import workflow tests
    import_workflow: Import workflow tests
    cloning: Voice cloning wizard tests
    voice_cloning: Voice cloning workflow tests
    wizard: Wizard workflow tests
    workflow: General workflow tests
    settings: Settings workflow tests
    synthesis: Voice synthesis tests
    voice: Voice-related tests
    transcription: Transcription workflow tests
    stt: Speech-to-text tests
    realtime: Real-time voice converter tests
    voice_conversion: Voice conversion tests
    panels: Panel functionality matrix tests
    engines: Engine availability tests
    advanced: Advanced feature tests
    features: Feature validation tests
    api: API-only tests (no UI)
    load: Load and stress tests
    websocket: WebSocket tests
    benchmark: Benchmark and performance measurement tests
    project: Project management tests
    complete: Complete workflow tests
    batch: Batch processing workflow tests
    effects: Audio effects workflow tests
    training: Model training workflow tests
    contracts: API contract validation tests
    security: Security tests
    input_validation: Input validation and injection prevention tests
    file_security: File upload security tests
    api_key: API key management security tests
    database: Database tests
    recovery: Error recovery tests
    allan_watts: Allan Watts audio file workflow tests
    events: Inter-panel event tests
    performance: Performance and timing tests
    errors: Error handling tests
    conversion: Audio conversion tests
    library: Library panel tests
    installer: Installer and deployment tests
    portable: Portable mode tests
    deployment: Deployment and distribution tests
    ci: CI/CD configuration validation tests

# Minimum Python version
minversion = 6.0

# Asyncio configuration
asyncio_mode = auto

# Coverage options (when pytest-cov is used)
[coverage:run]
source = app,backend
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */.venv/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
# Minimum coverage threshold - fails if below this
# Phase 4 target: 95% coverage
fail_under = 95
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    assert False
    raise RuntimeError

