[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
markers =
    accuracy: Accuracy tests
    performance: Performance tests
    integration: Integration tests
    unit: Unit tests
    slow: Slow running tests
